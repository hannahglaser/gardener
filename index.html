    <div class="item"><span class="sw" style="background: var(--cal-bloom)"></span>Bloom / fruit</div>
  `;
  root.appendChild(legend);

  /* table */
  const scroll = el('div', { class: 'cal-scroll' });
  const table = el('div', { class: 'cal-table' });

  /* months header */
  const months = el('div', { class: 'cal-months' });
  months.appendChild(el('div', null, 'Plant'));
  MONTHS.forEach(m => months.appendChild(el('div', null, m)));
  table.appendChild(months);

  /* rows wrap with frost overlay */
  const rowsWrap = el('div', { class: 'cal-rows-wrap' });

  /* group plants by family for section dividers */
  const order = ['tomato','pepper','cucumber','squash','brassica','root','allium','herb','flower','berry','cane','legume','perennial','cover'];
  const grouped = {};
  Object.entries(PLANT_INFO).forEach(([name, info]) => {
    (grouped[info.fam] = grouped[info.fam] || []).push([name, info]);
  });

  order.forEach(fam => {
    if (!grouped[fam]) return;
    const sec = el('div', { class: 'cal-section' });
    const fLabel = el('div', { class: 'sec-name' }, FAM[fam].label);
    fLabel.style.borderRight = '1px solid var(--line-soft)';
    sec.appendChild(fLabel);
    sec.appendChild(el('div'));
    rowsWrap.appendChild(sec);

    grouped[fam].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name, info]) => {
      rowsWrap.appendChild(calRow(name, info));
    });
  });

  /* frost overlays — span only the right portion (after the name col 200px) */
  /* We place them inside a wrapper that uses the same grid as cal-row */
  const overlay = el('div', { style: 'position:absolute; inset:0; pointer-events:none; display:grid; grid-template-columns:200px 1fr;' });
  overlay.appendChild(el('div'));
  const overTrack = el('div', { style: 'position:relative;' });
  [['last', FROST.last, '— last frost'], ['first', FROST.first, '— first frost']].forEach(([k, val, lbl]) => {
    const line = el('div', { class: 'cal-frost', style: `left:${pct(val)}` });
    line.appendChild(el('div', { class: 'lbl' }, lbl));
    overTrack.appendChild(line);
  });

  /* today line */
  const now = new Date();
  const todayDecimal = now.getMonth() + 1 + (now.getDate() - 1) / 30;
  const todayLine = el('div', { class: 'cal-today', style: `left:${pct(todayDecimal)}` });
  todayLine.appendChild(el('div', { class: 'lbl' }, '— today'));
  overTrack.appendChild(todayLine);

  overlay.appendChild(overTrack);
  rowsWrap.appendChild(overlay);

  /* On small screens, override the overlay grid to match */
  /* (left column is 110px in mobile media query) — handle via CSS variable */

  table.appendChild(rowsWrap);
  scroll.appendChild(table);
  root.appendChild(scroll);
}

function makeFrostNote(label, val) {
  const n = el('div', { class: 'frost-line' });
  n.innerHTML = `<span class="frost-tick"></span><span><strong>${label}</strong> ${val}</span>`;
  return n;
}

function pct(m) { return ((m - 1) / 12 * 100) + '%'; }

function calRow(name, info) {
  const row = el('div', { class: 'cal-row' });
  const fam = FAM[info.fam];
  const label = el('div', { class: 'cal-label' });
  label.innerHTML = `<span class="dot" style="background:${fam.color}"></span><span class="lname" title="${name}">${name}</span>`;
  row.appendChild(label);
  const track = el('div', { class: 'cal-track' });
  const order = ['indoor', 'harden', 'direct', 'transplant', 'harvest', 'bloom'];
  const cal = info.cal || {};
  Object.entries(cal).forEach(([kind, range]) => {
    if (!Array.isArray(range[0])) {
      track.appendChild(calBar(kind, range));
    } else {
      range.forEach(rng => track.appendChild(calBar(kind, rng)));
    }
  });
  row.appendChild(track);
  return row;
}

const CAL_KIND_LABEL = {
  indoor: 'Start indoors', harden: 'Harden off', transplant: 'Transplant out',
  direct: 'Direct sow', harvest: 'Harvest window', bloom: 'Bloom / fruit',
  plant: 'Plant',
};

function calBar(kind, [start, end]) {
  const left = (start - 1) / 12 * 100;
  const width = (end - start) / 12 * 100;
  const bar = el('div', {
    class: 'cal-bar',
    'data-kind': kind,
    style: `left:${left}%; width:${width}%`,
  });
  if (width > 6) bar.textContent = kind;
  else if (width > 2) bar.textContent = kind[0].toUpperCase();
  const tipText = `${CAL_KIND_LABEL[kind] || kind}  ·  ${monthLabel(start)} → ${monthLabel(end)}`;
  bar.addEventListener('mouseenter', e => showCalTip(e, tipText));
  bar.addEventListener('mousemove',  e => moveCalTip(e));
  bar.addEventListener('mouseleave', hideCalTip);
  return bar;
}

function monthLabel(decimal) {
  const m = Math.floor(decimal);
  const d = Math.round((decimal - m) * 30 + 1);
  return MONTHS[Math.min(11, m - 1)] + ' ' + Math.max(1, Math.min(30, d));
}

/* ── calendar tooltip ── */
let _calTip = null;
function getCalTip() {
  if (!_calTip) {
    _calTip = document.createElement('div');
    _calTip.id = 'cal-tip';
    document.body.appendChild(_calTip);
  }
  return _calTip;
}
function showCalTip(e, text) {
  const tip = getCalTip();
  tip.textContent = text;
  tip.classList.add('visible');
  posCalTip(e);
}
function moveCalTip(e) { posCalTip(e); }
function posCalTip(e) {
  const tip = getCalTip();
  const x = e.clientX + 12, y = e.clientY - 32;
  tip.style.left = Math.min(x, window.innerWidth - tip.offsetWidth - 8) + 'px';
  tip.style.top  = Math.max(4, y) + 'px';
}
function hideCalTip() { getCalTip().classList.remove('visible'); }

/* ============================================================
 *   WEATHER WIDGET  —  Open-Meteo, no API key needed
 *   Greenfield MA: 42.587°N 72.601°W
 * ============================================================ */
let weatherCache = null;
let weatherStatus = null; /* 'ok' | 'mild' | 'dry' */

async function fetchWeather() {
  if (weatherCache) return weatherCache;
  /* past_days=7 + forecast_days=3 → 10 entries; indices 0-6 history, 7-9 forecast */
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=42.587&longitude=-72.601'
    + '&daily=precipitation_sum,et0_fao_evapotranspiration,temperature_2m_max,temperature_2m_min'
    + '&current=temperature_2m,weathercode'
    + '&past_days=7&forecast_days=3'
    + '&timezone=America%2FNew_York';
  const resp = await fetch(url);
  const data = await resp.json();
  const precip = data.daily.precipitation_sum;
  const et0   = data.daily.et0_fao_evapotranspiration;
  const histP = precip.slice(0, 7);
  const foreP = precip.slice(7);
  const histE = et0.slice(0, 7);
  const rain7        = histP.reduce((a, b) => a + (b || 0), 0);  /* full 7-day total */
  const et0_7        = histE.reduce((a, b) => a + (b || 0), 0);
  const forecastTmrw = foreP[0] || 0;                             /* tomorrow only */
  const forecast     = foreP.reduce((a, b) => a + (b || 0), 0);  /* 3-day display total */
  const dates        = data.daily.time;
  const c2f = c => Math.round(c * 9 / 5 + 32);
  const todayHiF    = data.daily.temperature_2m_max ? c2f(data.daily.temperature_2m_max[7]) : null;
  const todayLoF    = data.daily.temperature_2m_min ? c2f(data.daily.temperature_2m_min[7]) : null;
  const currentTempF = data.current ? c2f(data.current.temperature_2m) : null;
  const currentCode  = data.current ? data.current.weathercode : null;
  weatherCache = { rain7, et0_7, forecastTmrw, forecast, dates, todayHiF, todayLoF, currentTempF, currentCode };
  return weatherCache;
}

function weatherIcon(code) {
  const a = 'fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  const w = body => `<svg viewBox="0 0 16 16" width="15" height="15" ${a}>${body}</svg>`;
  const cloud = 'M3.5 10.5H10a2.5 2.5 0 0 0 0-5 2.5 2.5 0 0 0-4.6-1.2A2 2 0 0 0 3.5 10.5Z';
  if (code === 0)    /* clear */
    return w('<circle cx="8" cy="8" r="2.5"/>'
      + '<line x1="8" y1="1.5" x2="8" y2="3.2"/><line x1="8" y1="12.8" x2="8" y2="14.5"/>'
      + '<line x1="1.5" y1="8" x2="3.2" y2="8"/><line x1="12.8" y1="8" x2="14.5" y2="8"/>'
      + '<line x1="3.3" y1="3.3" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="12.7" y2="12.7"/>'
      + '<line x1="12.7" y1="3.3" x2="11.5" y2="4.5"/><line x1="4.5" y1="11.5" x2="3.3" y2="12.7"/>');
  if (code <= 2)     /* partly cloudy */
    return w('<circle cx="5.5" cy="6" r="2.2"/>'
      + '<line x1="5.5" y1="2.5" x2="5.5" y2="3.4"/><line x1="2" y1="6" x2="2.9" y2="6"/>'
      + '<line x1="8" y1="6" x2="8.9" y2="6"/>'
      + '<path d="M7.5 11H12a2 2 0 0 0 0-4 2 2 0 0 0-3.7-1"/>');
  if (code <= 48)    /* cloudy / fog */
    return w(`<path d="${cloud}"/>`
      + (code >= 45 ? '<line x1="5" y1="12" x2="4" y2="14"/><line x1="8" y1="12" x2="7" y2="14"/>' : ''));
  if (code >= 71 && code <= 77) /* snow */
    return w(`<path d="${cloud}"/>`
      + '<circle cx="5" cy="13" r="0.9" fill="currentColor" stroke="none"/>'
      + '<circle cx="8.5" cy="13.8" r="0.9" fill="currentColor" stroke="none"/>'
      + '<circle cx="12" cy="13" r="0.9" fill="currentColor" stroke="none"/>');
  if (code >= 95)    /* thunder */
    return w(`<path d="${cloud}"/><path d="M8.5 10.5 7 13.5h2.5L7.5 16.5"/>`);
  /* rain (drizzle 51-57, rain 61-67, showers 80-82) */
  return w(`<path d="${cloud}"/>`
    + '<line x1="5" y1="12" x2="4.2" y2="14.5"/>'
    + '<line x1="8" y1="12" x2="7.2" y2="14.5"/>'
    + '<line x1="11" y1="12" x2="10.2" y2="14.5"/>');
}

function buildWeatherWidget(bedKey) {
  const widget = el('div', { class: 'weather-widget' });

  /* Grow bags: ET-based calc is irrelevant — containers dry in 1-2 days regardless */
  if (bedKey === 'bags') {
    widget.className = 'weather-widget weather-ok';
    const sp = el('span', { class: 'weather-stat' });
    sp.innerHTML = '<span class="wk">grow bags</span><span class="wv">check daily</span>';
    widget.appendChild(sp);
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(el('span', { class: 'weather-rec' }, ['10-gal containers dry in 1-2 days — water independently of weather']));
    widget.appendChild(el('a', { class: 'weather-src', href: 'https://open-meteo.com', target: '_blank', rel: 'noopener' }, ['Open-Meteo']));
    return widget;
  }

  widget.appendChild(el('span', { class: 'weather-loading' }, ['Checking weather…']));

  fetchWeather().then(({ rain7, et0_7, forecastTmrw, forecast, dates }) => {
    /* Seasonal crop coefficient: vegetable ET is higher than grass-reference ET0 */
    const mo = new Date().getMonth() + 1;
    const kc = mo <= 5 ? 0.7 : mo === 6 ? 0.85 : mo === 7 ? 1.0 : mo === 8 ? 1.1 : 0.85;

    const cropET         = et0_7 * kc;
    const rawDeficit     = Math.max(0, cropET - rain7);
    const forecastCredit = forecastTmrw * 0.7;  /* tomorrow only, 70% reliability */
    const netDeficit     = Math.max(0, rawDeficit - forecastCredit);
    const mm2in = mm => (mm / 25.4).toFixed(1) + '″';

    /* Date range labels */
    const fmtD = iso => {
      const [, m, d] = iso.split('-');
      return ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m] + ' ' + +d;
    };
    const fmtRange = isos => {
      const [, m1] = isos[0].split('-');
      const [, m2, d2] = isos[isos.length - 1].split('-');
      return m1 === m2 ? fmtD(isos[0]) + '–' + +d2 : fmtD(isos[0]) + ' – ' + fmtD(isos[isos.length - 1]);
    };
    const histRange = fmtRange(dates.slice(0, 7));
    const foreRange = fmtRange(dates.slice(7));

    /* Per-bed recommendation */
    const bedLabel = { left: 'Left bed', right: 'Right bed', middle: 'Berry patch', unfenced: 'Squash patch' }[bedKey] || 'Beds';
    const extra = bedKey === 'right' ? ' · Row F: keep surface moist' : '';

    let statusClass, rec;
    if (netDeficit < 12) {
      statusClass = 'ok';
      rec = forecast > 5 ? `${mm2in(forecast)} forecast — ${bedLabel} OK${extra}` : `${bedLabel} OK${extra}`;
    } else if (netDeficit < 25) {
      statusClass = 'mild';
      rec = forecast > 5
        ? `${mm2in(forecast)} coming; ${bedLabel} may need ~${mm2in(netDeficit)}${extra}`
        : `${bedLabel} needs ~${mm2in(netDeficit)}${extra}`;
    } else {
      statusClass = 'dry';
      rec = forecast > 5
        ? `${mm2in(forecast)} coming but short — water ${bedLabel} ~${mm2in(netDeficit)}${extra}`
        : `Water ${bedLabel} ~${mm2in(netDeficit)}${extra}`;
    }

    weatherStatus = statusClass;
    widget.className = 'weather-widget weather-' + statusClass;
    widget.innerHTML = '';
    const s = (k, v) => {
      const sp = el('span', { class: 'weather-stat' });
      sp.innerHTML = `<span class="wk">${k}</span><span class="wv">${v}</span>`;
      return sp;
    };
    widget.appendChild(s('rain ' + histRange, mm2in(rain7)));
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(s('ET×Kc ' + histRange, mm2in(cropET)));
    if (forecast > 1) {
      widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
      widget.appendChild(s('forecast ' + foreRange, mm2in(forecast)));
    }
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(s('needed', mm2in(netDeficit)));
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(el('span', { class: 'weather-rec' }, [rec]));
    widget.appendChild(el('a', { class: 'weather-src', href: 'https://open-meteo.com', target: '_blank', rel: 'noopener' }, ['Open-Meteo']));
  }).catch(() => { widget.className = 'weather-widget'; weatherStatus = 'dry'; });

  return widget;
}

/* ============================================================
 *   RENDER: GARDEN EXPERT
 * ============================================================ */
function buildGardenContext(question) {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const lines = [
    'You are an expert horticulturist and garden planner.',
    `Today is ${dateStr}. Garden: Greenfield, Massachusetts · Zone 5b/6a · Last frost May 10 · First frost Oct 5.`,
    '',
  ];

  const SKIP_FALL = key => key.endsWith('Fall');
  for (const bedKey of Object.keys(BEDS).filter(k => !SKIP_FALL(k))) {
    const bed = BEDS[bedKey];
    lines.push(`=== ${bed.title.toUpperCase()} ===`);
    lines.push(`Size: ${bed.dims}`);
    lines.push(bed.lead);

    if (bed.rows && bed.rows.length) {
      lines.push('Row layout: ' + bed.rows.map(r => `Row ${r.letter} — ${r.label}${r.dim ? ' (' + r.dim + ')' : ''}`).join('; '));
    }

    if (bed.plants) {
      const counts = {};
      bed.plants.forEach(pl => { counts[pl.name] = (counts[pl.name] || 0) + 1; });
      lines.push('Plants:');
      Object.entries(counts).forEach(([name, count]) => {
        const info = PLANT_INFO[name];
        const parts = [`${name} ×${count}`];
        if (info) {
          if (info.spacing) parts.push(`spacing: ${info.spacing}`);
          if (info.water)   parts.push(`water: ${info.water}`);
          if (info.care)    parts.push(`care: ${info.care}`);
          if (info.companions && info.companions.length)
            parts.push(`companions: ${info.companions.map(c => c.with).join(', ')}`);
        }
        lines.push('  · ' + parts.join(' | '));
      });
    }

    if (bed.bags) {
      lines.push('Bags:');
      bed.bags.forEach(b => {
        const info = PLANT_INFO[b.plant.name];
        const parts = [`${b.id}: ${b.plant.name} ×${b.n}`];
        if (info) {
          if (info.water) parts.push(`water: ${info.water}`);
          if (info.care)  parts.push(`care: ${info.care}`);
        }
        if (b.note) parts.push(`note: ${b.note}`);
        lines.push('  · ' + parts.join(' | '));
      });
    }
    lines.push('');
  }

  if (weatherStatus) {
    const label = { ok: 'beds OK — recent rain covers needs', mild: 'mild deficit — beds could use water soon', dry: 'dry — beds need water' };
    lines.push(`Current weather status: ${label[weatherStatus] || weatherStatus}`);
    lines.push('');
  }

  lines.push('=== QUESTION ===');
  lines.push(question && question.trim() ? question.trim() : `What should I be doing in the garden today, ${dateStr}?`);
  return lines.join('\n');
}

function renderExpert(root) {
  const wrap = el('div', { class: 'expert-launch' });
  const card = el('div', { class: 'expert-launch-card' });

  card.appendChild(el('h2', { class: 'serif' }, ['Garden Expert']));
  card.appendChild(el('p', { class: 'expert-launch-desc' }, [
    'Opens Claude with your full garden loaded — all beds, plant care details, row layouts, and current weather. Type your question below or leave blank for a general check-in.'
  ]));

  card.appendChild(el('div', { class: 'expert-q-label' }, ['Your question']));
  const textarea = el('textarea', {
    class: 'expert-q-input',
    placeholder: 'e.g. Do I need to water today? Which tomatoes need staking? When should I harvest the garlic?',
  });
  card.appendChild(textarea);

  const getCtx = () => buildGardenContext(textarea.value);

  const btn = el('a', {
    class: 'expert-launch-btn',
    target: '_blank',
    rel: 'noopener',
  }, ['Ask Claude →']);

  const setHref = () => { btn.href = 'https://claude.ai/new?q=' + encodeURIComponent(getCtx()); };
  btn.addEventListener('click', setHref);
  btn.addEventListener('mousedown', setHref);

  const copyBtn = el('button', { class: 'expert-copy-btn' }, ['Copy context']);
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(getCtx()).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy context'; }, 2000);
    });
  };

  const actions = el('div', { class: 'expert-launch-actions' });
  actions.appendChild(btn);
  actions.appendChild(copyBtn);
  card.appendChild(actions);

  card.appendChild(el('p', { class: 'expert-context-hint' }, [
    'Context includes: all 5 beds · plant care & spacing · row layouts · companions · today\'s weather status'
  ]));

  wrap.appendChild(card);
  root.appendChild(wrap);
}

function renderTasks(root) {
  const MONTHS = [
    { n: 5,  name: 'May',       sub: 'Last frost May 10 · transplant season' },
    { n: 6,  name: 'June',      sub: 'Establishment · first harvests' },
    { n: 7,  name: 'July',      sub: 'Peak production begins' },
    { n: 8,  name: 'August',    sub: 'Full harvest · summer peak' },
    { n: 9,  name: 'September', sub: 'Wind down · winter squash' },
    { n: 10, name: 'October',   sub: 'First frost Oct 5 · close out · plant garlic' },
    { n: 11, name: 'November',  sub: 'Garden to sleep · mulch alliums' },
  ];
  const CAT_LABEL = { plant:'Plant', harvest:'Harvest', maintain:'Maintain', build:'Build', watch:'Watch', feed:'Feed' };
  const now = new Date();
  const currentMonth = now.getMonth() + 1;

  const wrap = el('div', { class: 'tasks-view' });

  MONTHS.forEach(({ n, name, sub }) => {
    const tasks = GARDEN_TASKS.filter(t => t.month === n);
    const isCurrent = n === currentMonth;
    const isPast    = n < currentMonth;

    const section = el('div', { class: 'tasks-month' + (isCurrent ? ' is-current' : isPast ? ' is-past' : '') });

    const hdr = el('div', { class: 'tasks-month-header' });
    hdr.appendChild(el('span', { class: 'tasks-month-name' }, [name]));
    if (isCurrent) hdr.appendChild(el('span', { class: 'tasks-month-badge' }, ['This month']));
    else hdr.appendChild(el('span', { style: 'font-size:12px;color:var(--ink-soft)' }, [sub]));
    section.appendChild(hdr);

    const list = el('ul', { class: 'tasks-list' });
    tasks.forEach(t => {
      const item = el('li', { class: 'task-item' });
      item.appendChild(el('span', { class: `task-cat cat-${t.cat}` }, [CAT_LABEL[t.cat]]));
      const body = el('div', { class: 'task-body' });
      body.appendChild(el('div', { class: 'task-text' }, [t.text]));
      if (t.detail) body.appendChild(el('div', { class: 'task-detail' }, [t.detail]));
      item.appendChild(body);
      list.appendChild(item);
    });
    section.appendChild(list);
    wrap.appendChild(section);
  });

  root.appendChild(wrap);
}

/* ============================================================
 *   RENDER: PHOTOS VIEW
 * ============================================================ */
function renderPhotos(root) {
  /* update count badge */
  const badge = document.getElementById('photoCount');
  if (badge) badge.textContent = PHOTOS.length + ' photos';

  const wrap = el('div', { style: 'max-width:1100px;margin:0 auto;padding:10px 0 60px' });

  const hdr = el('div', { class: 'photos-header' });
  hdr.appendChild(el('h2', { class: 'serif' }, ['Garden Journal']));
  hdr.appendChild(el('p', {}, [PHOTOS.length + ' photos · tap to enlarge · click again to zoom']));
  wrap.appendChild(hdr);

  /* lightbox overlay */
  const lb = el('div', { class: 'photo-lightbox', id: 'photo-lightbox' });
  const lbPrev = el('button', { class: 'photo-lb-nav photo-lb-prev', 'aria-label': 'Previous' }, ['‹']);
  const lbNext = el('button', { class: 'photo-lb-nav photo-lb-next', 'aria-label': 'Next' }, ['›']);
  const lbInner = el('div', { class: 'photo-lightbox-inner' });
  const lbImg = el('img', { alt: '' });
  const lbFoot = el('div', { class: 'photo-lightbox-footer' });
  const lbLeft = el('div');
  const lbCaption = el('div', { class: 'photo-lightbox-caption' });
  const lbDate = el('div', { class: 'photo-lightbox-date' });
  lbLeft.appendChild(lbCaption);
  lbLeft.appendChild(lbDate);
  const lbClose = el('button', { class: 'photo-lightbox-close' }, ['Close']);
  lbFoot.appendChild(lbLeft);
  lbFoot.appendChild(lbClose);
  lbInner.appendChild(lbImg);
  lbInner.appendChild(lbFoot);
  lb.appendChild(lbPrev);
  lb.appendChild(lbInner);
  lb.appendChild(lbNext);
  document.body.appendChild(lb);

  let lbIdx = 0;
  const openLbAt = (idx) => {
    lbIdx = (idx + PHOTOS.length) % PHOTOS.length;
    const p = PHOTOS[lbIdx];
    const num = lrNums[lbIdx];
    lbImg.src = 'photos/' + p.file;
    lbCaption.textContent = p.caption;
    lbDate.textContent = '#' + num + ' · ' + p.date;
    lbImg.classList.remove('lb-zoomed');
    lbImg.style.transformOrigin = 'center center';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  const closeLb = () => {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
    lbImg.classList.remove('lb-zoomed');
    lbImg.style.transformOrigin = 'center center';
  };
  lbPrev.onclick = (e) => { e.stopPropagation(); openLbAt(lbIdx - 1); };
  lbNext.onclick = (e) => { e.stopPropagation(); openLbAt(lbIdx + 1); };
  lbClose.onclick = closeLb;
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') openLbAt(lbIdx + 1);
    if (e.key === 'ArrowLeft') openLbAt(lbIdx - 1);
  });

  /* lightbox click-to-zoom */
  lbImg.addEventListener('click', (e) => {
    e.stopPropagation();
    const zoomed = lbImg.classList.toggle('lb-zoomed');
    if (zoomed) {
      const rect = lbImg.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      lbImg.style.transformOrigin = `${x}% ${y}%`;
    } else {
      lbImg.style.transformOrigin = 'center center';
    }
  });

  /* collage */
  const collage = el('div', { class: 'photos-collage' });
  /* pre-compute L-R badge numbers based on column/row position */
  const lrNums = (() => {
    const numCols = 1 + PHOTOS.filter(p => p.colStart).length;
    let col = 0;
    const rowInCol = Array(numCols).fill(0);
    return PHOTOS.map(p => {
      if (p.colStart) col++;
      const r = rowInCol[col]++;
      return r * numCols + col + 1;
    });
  })();
  let photoIdx = 0;
  PHOTOS.forEach((p, arrIdx) => {
    if (p.month) {
      const div = el('div', { class: 'photos-month-divider' });
      div.appendChild(el('span', { class: 'photos-month-label' }, [p.month]));
      collage.appendChild(div);
    }
    const num = lrNums[photoIdx++];
    const card = el('div', { class: 'photo-card', style: (p.colStart ? 'break-before:column;' : '') + `order:${num}` });
    card.onclick = () => openLbAt(arrIdx);

    const imgWrap = el('div', { class: 'photo-card-img-wrap' });
    const img = el('img', { src: 'photos/' + p.file, alt: p.caption, loading: 'lazy' });
    const numBadge = el('div', { class: 'photo-num-badge' }, [String(num)]);
    const dateBadge = el('div', { class: 'photo-date-badge' }, [p.date]);
    imgWrap.appendChild(img);
    imgWrap.appendChild(numBadge);
    imgWrap.appendChild(dateBadge);
    card.appendChild(imgWrap);
    card.appendChild(el('div', { class: 'photo-caption' }, [p.caption]));
    collage.appendChild(card);
  });

  wrap.appendChild(collage);
  root.appendChild(wrap);
}

/* Warm weather cache at init so Garden Expert tab has status even without visiting Map */
fetchWeather().then(({ rain7, et0_7, forecastTmrw, todayHiF, todayLoF, currentTempF, currentCode }) => {
  const mo = new Date().getMonth() + 1;
  const kc = mo <= 5 ? 0.7 : mo === 6 ? 0.85 : mo === 7 ? 1.0 : mo === 8 ? 1.1 : 0.85;
  const nd = Math.max(0, Math.max(0, et0_7 * kc - rain7) - forecastTmrw * 0.7);
  if (!weatherStatus) weatherStatus = nd < 12 ? 'ok' : nd < 25 ? 'mild' : 'dry';
  const corner = document.getElementById('weather-corner');
  if (corner) {
    if (currentCode !== null) corner.querySelector('.wc-icon').innerHTML = weatherIcon(currentCode);
    if (currentTempF !== null) corner.querySelector('.wc-now').textContent = currentTempF + '°F now';
    if (todayHiF !== null && todayLoF !== null)
      corner.querySelector('.wc-hilo').textContent = 'H: ' + todayHiF + '°  L: ' + todayLoF + '°';
  }
}).catch(() => { if (!weatherStatus) weatherStatus = 'dry'; });

/* keyboard nav for top tabs */
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const order = ['map','photos','plants','calendar','tasks','expert'];
  const i = order.indexOf(activeView);
  if (e.key === 'ArrowRight' && e.altKey) { activeView = order[(i+1)%6]; renderAll(); }
  if (e.key === 'ArrowLeft' && e.altKey)  { activeView = order[(i-1+6)%6]; renderAll(); }
});
