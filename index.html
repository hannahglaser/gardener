<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hannah + Dom's Garden</title>
<style>
  /* ============================================================
   *   TOKENS
   * ============================================================ */
  :root {
    --bg:        #f5efe1;
    --bg-2:      #ede4cf;
    --paper:     #fbf6ea;
    --paper-2:   #f3ecd6;
    --ink:       #2a2418;
    --ink-soft:  #6a5f48;
    --ink-mute:  #94886a;
    --line:      #c9bd9f;
    --line-soft: #ddd1b3;
    --terra:     #b96b3e;
    --terra-dk:  #8b4a26;
    --moss:      #4d6a35;
    --moss-dk:   #364a23;

    /* plant families */
    --c-tom:    #c44438;
    --c-pep:    #7b3f86;
    --c-cuke:   #3f6f95;
    --c-bras:   #3a8a7d;
    --c-root:   #d77a2c;
    --c-alli:   #8d8a82;
    --c-squash: #6a9438;
    --c-herb:   #2f5a2d;
    --c-flw:    #d9b13a;
    --c-berry:  #4a5d9a;
    --c-cane:   #a13e6e;
    --c-legume: #8d9243;

    --shadow: 0 1px 0 rgba(120,90,40,.10), 0 12px 30px -18px rgba(80,55,15,.35);
    --shadow-sm: 0 1px 2px rgba(80,55,15,.10);

    /* calendar activity colors */
    --cal-indoor:    #ddc88a;
    --cal-harden:    #c8d2a6;
    --cal-transplant:#7fa55d;
    --cal-direct:    #c97a3f;
    --cal-harvest:   #4d6a35;
    --cal-bloom:     #d9b13a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(185, 107, 62, .04), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(77, 106, 53, .05), transparent 45%);
    background-attachment: fixed;
  }
  .serif {
    font-family: "Cormorant Garamond", "Garamond", "Georgia", "Iowan Old Style", "Times New Roman", serif;
    font-weight: 500; letter-spacing: .01em;
  }
  .mono {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 12px; letter-spacing: .02em;
  }

  /* ============================================================
   *   HEADER
   * ============================================================ */
  header.app {
    max-width: 1240px; margin: 0 auto;
    padding: 26px 24px 0;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .seal {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--ink);
    display: grid; place-items: center;
    box-shadow: var(--shadow); position: relative;
  }
  .seal::after {
    content:""; position: absolute; inset: 4px; border-radius: 50%;
    border: 1px dashed var(--line);
  }
  .seal svg { width: 24px; height: 24px; position: relative; }
  h1.title { font-size: 30px; margin: 0; letter-spacing: .005em; }
  .kicker {
    font-size: 11px; text-transform: uppercase; letter-spacing: .22em;
    color: var(--terra-dk); margin: 4px 0 0;
  }
  .meta { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

  nav.toptabs {
    margin: 22px 0 0;
    display: flex; flex-wrap: wrap; gap: 4px;
    border-bottom: 1px solid var(--line);
  }
  nav.toptabs button {
    appearance: none; background: transparent; border: 0;
    padding: 12px 16px 10px;
    font: inherit; color: var(--ink-soft); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    display: flex; align-items: baseline; gap: 10px;
  }
  nav.toptabs button:hover { color: var(--ink); }
  nav.toptabs button.is-active { color: var(--ink); border-bottom-color: var(--terra); }
  nav.toptabs .tt-num {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 13px; color: var(--terra-dk); font-style: italic;
  }
  nav.toptabs .tt-name { font-size: 15px; font-weight: 500; }
  nav.toptabs .tt-count {
    font-size: 11px; color: var(--ink-mute);
    background: var(--bg-2); padding: 2px 7px; border-radius: 10px;
    font-family: ui-monospace, monospace;
  }

  /* ============================================================
   *   MAIN
   * ============================================================ */
  main {
    max-width: 1240px; margin: 0 auto;
    padding: 24px 24px 80px;
  }
  .view { /* no entrance animation */ }

  /* ============================================================
   *   MAP VIEW: sub-tabs + schematic
   * ============================================================ */
  .subtabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .subtabs button {
    appearance: none; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink-soft);
    padding: 8px 14px; font: inherit; font-size: 13px;
    border-radius: 999px; cursor: pointer;
    transition: all .15s;
  }
  .subtabs button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .subtabs button.is-active {
    background: var(--ink); color: var(--paper);
    border-color: var(--ink);
  }
  .subtabs button .sub-em {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; margin-right: 6px;
    color: inherit; opacity: .7;
  }

  .map-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
  }
  @media (max-width: 900px) { .map-grid { grid-template-columns: 1fr; } }

  .bed-head {
    margin-bottom: 14px;
    display: flex; flex-wrap: wrap; gap: 12px 22px; align-items: baseline;
  }
  .bed-head h2 { font-size: 26px; margin: 0; }
  .bed-head .dims {
    font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--ink-soft); background: var(--bg-2);
    padding: 4px 10px; border-radius: 4px; letter-spacing: .03em;
  }
  .bed-head p.lead {
    flex-basis: 100%; margin: 0; color: var(--ink-soft); max-width: 64ch;
  }

  .totals {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; background: var(--paper);
    margin-bottom: 16px;
  }
  .totals > div { padding: 10px 14px; border-right: 1px solid var(--line); }
  .totals > div:last-child { border-right: 0; }
  .totals .k {
    font-size: 10px; text-transform: uppercase; letter-spacing: .18em;
    color: var(--ink-soft);
  }
  .totals .v {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px; line-height: 1.1; margin-top: 2px;
  }

  .diagram-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .diagram-frame {
    background: var(--paper-2);
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 18px 18px 22px;
    position: relative;
  }
  .diagram-frame::before {
    content: "N";
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 13px; color: var(--terra-dk);
  }
  .compass-line {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    width: 1px; height: 8px; background: var(--terra-dk);
  }
  .diagram-frame::after {
    content: "S"; position: absolute; bottom: 4px; left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
  }
  .ew-tick {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
  }
  .ew-tick.w { left: 4px; }
  .ew-tick.e { right: 4px; }

  /* ============================================================
   *   BED SVG CANVAS — proportional planting diagram
   * ============================================================ */
  .bed-svg-wrap {
    background: var(--paper);
    border-radius: 6px;
    padding: 8px 10px 10px;
    border: 1px solid var(--line-soft);
  }
  .bed-svg-meta {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 6px 14px;
    padding: 0 4px 8px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 12px;
    color: var(--ink-soft);
    border-bottom: 1px dashed var(--line-soft);
    margin-bottom: 8px;
  }
  .bed-svg-meta .bed-compass {
    color: var(--terra-dk);
    letter-spacing: .08em;
  }
  .bed-svg-meta .bed-compass .arrow { font-style: normal; font-weight: 700; }
  .bed-svg-meta .bed-axis-x,
  .bed-svg-meta .bed-axis-y {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: ui-monospace, monospace;
    font-style: normal; font-size: 11px;
    color: var(--ink-mute); letter-spacing: .04em;
  }
  .bed-svg-meta .rule {
    display: inline-block; width: 28px; height: 1px;
    background: var(--line);
  }

  .bed-svg {
    display: block;
    width: 100%;
    height: auto;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--paper) 92%, var(--moss) 4%), var(--paper));
    border-radius: 4px;
    overflow: visible;
  }
  .bed-svg .grid-line {
    stroke: rgba(150, 130, 80, 0.10);
    stroke-width: 0.4;
  }
  .bed-svg .zone-line {
    stroke: var(--terra);
    stroke-width: 0.8;
    stroke-dasharray: 3 2;
    opacity: .6;
  }
  .bed-svg .zone-label {
    fill: var(--ink-mute);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    letter-spacing: .04em;
  }

  .bed-svg .band-path { fill: rgba(185, 107, 62, .09); }
  .bed-svg .band-gap  { fill: rgba(160, 145, 100, .07); }
  .bed-svg .band-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
  }
  .bed-svg .band-path-label { fill: var(--terra-dk); }
  .bed-svg .band-gap-label  { fill: var(--ink-mute); }

  .bed-svg .row-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    fill: var(--ink);
    font-weight: 500;
  }
  .bed-svg .row-dim {
    font-family: ui-monospace, monospace;
    fill: var(--ink-mute);
  }

  .bed-svg .sub-block {
    fill: rgba(196, 68, 56, .035);
    stroke: var(--c-tom);
    stroke-width: 0.5;
    stroke-dasharray: 2 1.5;
  }
  .bed-svg .sub-block.pepper-block {
    fill: rgba(123, 63, 134, .04);
    stroke: var(--c-pep);
  }
  .bed-svg .sub-block-label {
    fill: var(--ink-mute);
    font-family: ui-monospace, monospace;
    font-style: italic;
  }

  .bed-svg .plant-g {
    cursor: pointer;
    transition: filter .15s;
  }
  .bed-svg .plant-g:hover { filter: brightness(.94); }
  .bed-svg .plant-g circle {
    transition: stroke-width .12s;
  }
  .bed-svg .plant-g:hover circle,
  .bed-svg .plant-g.is-active circle {
    stroke-width: 1.8;
  }
  .bed-svg .plant-g.is-active circle {
    filter: drop-shadow(0 0 1.2px rgba(0,0,0,.45));
  }
  .bed-svg .plant-code {
    font-family: ui-sans-serif, system-ui, sans-serif;
    pointer-events: none;
    user-select: none;
  }
  .bed-svg .carrot-band-rect {
    fill: rgba(215, 122, 44, .18);
    stroke: var(--c-root);
    stroke-width: 0.6;
    stroke-dasharray: 2 1.5;
  }
  .bed-svg .carrot-band-g:hover .carrot-band-rect {
    fill: rgba(215, 122, 44, .28);
  }
  .bed-svg .carrot-band-label {
    fill: var(--c-root);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    letter-spacing: .04em;
    pointer-events: none;
  }

  /* schematic rows */
  .schem {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 16px;
  }

  /* ============================================================
   *   JSX-style hand-laid bed diagrams (left / right / unfenced / bags)
   * ============================================================ */
  .jsx-bed-wrap {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 4px;
  }
  .jsx-note {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-mute);
    margin: 0 0 2px;
    letter-spacing: .01em;
  }
  .jsx-bed-svg-wrap {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 6px 8px;
  }
  .jsx-bed-svg {
    display: block;
    width: 100%;
    height: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }
  .jsx-bed-svg text { user-select: none; }
  .jsx-plant { cursor: pointer; transition: filter .12s; }
  .jsx-plant:hover { filter: brightness(.92) saturate(1.05); }
  .jsx-plant:hover circle,
  .jsx-plant:hover rect,
  .jsx-plant:hover ellipse,
  .jsx-plant.is-active circle,
  .jsx-plant.is-active rect,
  .jsx-plant.is-active ellipse {
    stroke-width: 2;
  }
  .jsx-plant.is-active { filter: drop-shadow(0 0 1.5px rgba(0,0,0,.4)); }

  .jsx-bed-legend {
    display: flex; flex-wrap: wrap; gap: 4px 14px;
    padding: 6px 10px;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .jsx-leg-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .jsx-leg-sw {
    width: 9px; height: 9px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .jsx-leg-sw.sq { border-radius: 2px; }

  .schem-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px; align-items: stretch;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 12px 14px;
    transition: border-color .15s;
  }
  .schem-row:hover { border-color: var(--line); }
  .schem-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    color: var(--ink-mute);
    padding: 8px 14px;
  }
  .schem-row.empty.path {
    background: repeating-linear-gradient(45deg,
      rgba(185,107,62,.04) 0 8px, transparent 8px 16px);
    border: 1px dashed var(--terra);
    color: var(--terra-dk);
  }
  .schem-row.empty.path .row-info p {
    color: var(--terra-dk);
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 12.5px;
    letter-spacing: .04em;
  }
  .schem-row.empty .row-info p { color: var(--ink-mute); font-style: italic; }
  .row-head {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .row-letter {
    flex: none;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--paper-2); border: 1px solid var(--line);
    display: grid; place-items: center;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600; font-size: 15px; color: var(--terra-dk);
  }
  .row-info { min-width: 0; }
  .row-info h4 {
    margin: 0; font-size: 13.5px; font-weight: 600; line-height: 1.25;
  }
  .row-info p {
    margin: 2px 0 0;
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--ink-mute); letter-spacing: .02em;
  }
  .row-body {
    display: flex; flex-direction: column; gap: 8px;
    justify-content: center;
    min-width: 0;
    overflow-x: auto;
  }
  .track {
    display: flex; flex-wrap: nowrap; align-items: center;
    gap: 8px 22px;
  }
  .track-label {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
    width: 64px; flex: none;
  }
  .cluster {
    display: flex; flex-wrap: nowrap; gap: 5px; align-items: center;
    background: transparent;
    border: none;
    padding: 0;
  }
  .cluster.tight { padding: 0; }
  .cluster-sep { display: none; }

  /* alongside / divider marker — used for pepper block separation */
  .cluster-spacer {
    flex: none;
    display: inline-flex; align-items: center;
    padding: 0 8px;
    margin: 0 2px;
    height: 32px;
    border-left: 1px dashed var(--line);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10.5px;
    color: var(--ink-mute);
    letter-spacing: .08em;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* plant disc */
  .plant {
    position: relative; flex: none;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    transition: transform .12s ease;
    --fam-color: var(--c-tom);
  }
  .plant:hover { transform: translateY(-2px); }
  .plant .disc {
    width: 38px; height: 38px; border-radius: 50%;
    background: color-mix(in srgb, var(--fam-color) 14%, var(--paper));
    color: var(--fam-color);
    display: grid; place-items: center;
    font-weight: 700; font-size: 11.5px; letter-spacing: .02em;
    box-shadow: var(--shadow-sm);
    border: 1.8px solid var(--fam-color);
    transition: box-shadow .15s, transform .12s;
  }
  .plant:hover .disc,
  .plant.is-active .disc {
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink);
  }
  .plant .disc.lg { width: 52px; height: 52px; font-size: 13px; }
  .plant .disc.sm { width: 30px; height: 30px; font-size: 10px; border-width: 1.5px; }
  .plant .cap {
    font-size: 10px; color: var(--ink-soft);
    margin-top: 3px; max-width: 70px; text-align: center;
    line-height: 1.15;
  }
  .plant .cap.hidden { display: none; }

  /* nasturtium — outlined green N */
  .nast {
    --fam-color: var(--moss-dk);
  }
  .nast .disc {
    width: 26px; height: 26px;
    background: color-mix(in srgb, #f0d56a 35%, var(--paper));
    color: var(--moss-dk);
    border: 1.5px solid var(--moss-dk);
    font-size: 11px;
  }

  /* carrot band */
  .carrot-band {
    flex: 1 1 100%;
    background:
      repeating-linear-gradient(135deg,
        rgba(215,122,44,.18) 0 6px, rgba(215,122,44,.05) 6px 12px);
    border: 1.5px dashed var(--c-root);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    color: var(--c-root);
    font-weight: 600; font-size: 12px;
    letter-spacing: .12em;
    cursor: pointer;
  }
  .carrot-band:hover { background-color: rgba(215,122,44,.10); }
  .carrot-band small {
    display: block; color: var(--ink-mute); font-size: 10px;
    font-weight: 400; letter-spacing: .04em; margin-top: 2px;
    text-transform: none;
  }

  /* Right bed: triple-column layout — veg | blueberry | squash strip */
  .right-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 108px 92px;
    gap: 12px;
    align-items: stretch;
  }
  @media (max-width: 760px) {
    .right-layout { grid-template-columns: 1fr; }
  }
  .right-layout > .rows-col { min-width: 0; }
  .strip-col {
    border: 1px dashed var(--c-squash);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(106,148,56,.06), rgba(106,148,56,.12));
    padding: 12px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    position: relative;
  }
  .strip-col h4 {
    margin: 0;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 15px; color: var(--moss-dk);
    text-align: center;
  }
  .strip-col .strip-meta {
    font-family: ui-monospace, monospace;
    font-size: 10px; color: var(--ink-mute);
    text-align: center; line-height: 1.4;
  }
  .strip-col .mound-row {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    position: relative;
  }
  .strip-col .mound-row .vine-arrow {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    color: var(--c-squash); font-size: 13px;
  }
  .strip-col .mound-row .vine-arrow::after { content: "→"; }
  .strip-col .strip-gap {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10px;
    color: var(--ink-mute);
  }
  .strip-col .strip-fence {
    margin-top: auto; padding-top: 8px;
    width: 100%; text-align: center;
    border-top: 2px solid var(--terra-dk);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10.5px; color: var(--terra-dk);
  }
  .strip-col .strip-fence::before {
    content: "▲▲▲▲▲▲▲";
    display: block; color: var(--terra-dk);
    letter-spacing: 2px; font-size: 8px; line-height: 1;
    margin-bottom: 3px;
  }
  @media (max-width: 700px) {
    .right-layout { grid-template-columns: 1fr; }
  }
  .berry-col {
    border: 1px dashed var(--c-berry);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(74,93,154,.05), rgba(74,93,154,.10));
    padding: 12px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px;
    position: relative;
  }
  .berry-col h4 {
    margin: 0 0 4px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 16px; color: var(--c-berry);
    text-align: center;
  }
  .berry-col .berry-meta {
    font-family: ui-monospace, monospace;
    font-size: 10px; color: var(--ink-mute);
    text-align: center; line-height: 1.4;
  }
  .berry-col .fence-note {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px dashed var(--terra-dk);
    width: 100%;
    text-align: center;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 10.5px; color: var(--terra-dk);
    line-height: 1.3;
  }

  /* Strip bed: vertical column of mounds */
  .strip-layout {
    max-width: 280px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  .strip-row {
    border: 1px solid var(--line-soft); border-radius: 8px;
    background: var(--paper);
    padding: 12px 14px;
    display: grid; grid-template-columns: 80px 1fr;
    gap: 12px; align-items: center;
    position: relative;
  }
  .strip-row .info {
    font-size: 11px; color: var(--ink-soft);
    line-height: 1.25;
  }
  .strip-row .info strong { display: block; color: var(--ink); font-size: 12px; font-weight: 600; }
  .strip-row .info em { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; color: var(--ink-mute); }
  .strip-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    color: var(--ink-mute);
    text-align: center;
    grid-template-columns: 1fr;
    font-size: 11px; padding: 8px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  }
  .strip-row .vine-east {
    position: absolute; right: -34px; top: 50%; transform: translateY(-50%);
    width: 30px; color: var(--c-squash); font-size: 14px;
    display: flex; align-items: center; gap: 2px;
  }
  .strip-row .vine-east::after {
    content: "→"; font-size: 16px;
  }

  /* Middle bed: 4 cane rows running N-S → render as vertical columns */
  .middle-layout {
    display: flex; flex-direction: column; gap: 10px;
  }
  .middle-head {
    text-align: center; font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 12px; color: var(--ink-mute);
    letter-spacing: .12em; text-transform: uppercase;
  }
  .middle-cols {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    align-items: stretch;
  }
  @media (max-width: 800px) {
    .middle-cols { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px) {
    .middle-cols { grid-template-columns: 1fr 1fr; }
  }
  .cane-col {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 10px 6px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .cane-col-label {
    font-size: 12px;
    text-align: center;
    line-height: 1.3;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line-soft);
    width: 100%;
  }
  .cane-col-label .cane-letter {
    display: inline-grid; place-items: center; vertical-align: middle;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--paper-2); border: 1px solid var(--line);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 600; font-size: 12px;
    color: var(--terra-dk); margin-right: 6px;
  }
  .cane-col-label .cane-spacing {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: var(--ink-mute);
  }
  .cane-plants {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding-top: 4px;
  }

  /* Grow bags */
  .bags-layout {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .bag-card {
    --fam-color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 4px solid var(--fam-color);
    border-radius: 8px;
    padding: 12px 14px 12px 12px;
    display: grid; grid-template-columns: 62px 1fr;
    gap: 10px;
    cursor: pointer;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    box-shadow: var(--shadow-sm);
  }
  .bag-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px -8px rgba(80,55,15,.4); }
  .bag-shape { display: grid; place-items: center; }
  .bag-shape svg { width: 62px; height: auto; }
  .bag-body { min-width: 0; }
  .bag-id {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: var(--ink-mute); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .bag-plant {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px; line-height: 1.1; margin-top: 2px;
    color: var(--ink);
  }
  .bag-meta {
    font-family: ui-monospace, monospace; font-size: 10.5px;
    color: var(--ink-soft); margin-top: 3px;
  }
  .bag-note {
    font-size: 11px; line-height: 1.45;
    color: var(--ink-soft); margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line-soft);
  }

  /* Unfenced bed: 2 squash rows — visually tall & narrow (264″ NS × 126″ EW) */
  .unfenced-layout {
    display: flex; flex-direction: column; gap: 0;
    max-width: 380px; margin: 0 auto;
    position: relative;
  }
  .unfenced-layout .ns-ruler {
    position: absolute; top: 0; left: -18px; bottom: 0; width: 12px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between;
    color: var(--ink-mute); font-size: 9px; letter-spacing: .15em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  }
  .unfenced-layout .ns-ruler::before {
    content: ""; position: absolute; left: 50%; top: 6px; bottom: 6px;
    border-left: 1px dashed var(--line);
  }
  .squash-row {
    display: grid; grid-template-columns: 130px 1fr;
    gap: 12px; align-items: center;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 4px 0;
  }
  .squash-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    grid-template-columns: 1fr;
    text-align: center; color: var(--ink-mute);
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
    font-size: 12px; padding: 6px 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .squash-row.empty.path {
    background: repeating-linear-gradient(45deg,
      rgba(185,107,62,.04) 0 8px, transparent 8px 16px);
    border: 1px dashed var(--terra);
    color: var(--terra-dk);
  }
  .squash-row .mounds {
    display: flex; gap: 30px; flex-wrap: wrap;
  }
  .vine-south-note {
    text-align: center; font-style: italic;
    color: var(--c-squash);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px; padding: 6px 0;
  }
  .vine-south-note::before { content: "↓ "; }
  .vine-south-note::after  { content: " ↓"; }

  /* ============================================================
   *   SIDE PANEL
   * ============================================================ */
  aside.side { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
  .panel {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .panel h3 {
    margin: 0 0 10px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .2em;
    color: var(--terra-dk);
  }
  .panel h3::after {
    content: ""; display: block; width: 22px; height: 1px;
    background: var(--terra); margin-top: 4px;
  }

  .details .name {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 24px; line-height: 1.1; margin: 0 0 2px;
  }
  .details .fam {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; text-transform: uppercase; letter-spacing: .14em;
    color: var(--ink-soft); margin-bottom: 12px;
  }
  .details .fam .dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,.25);
  }
  .details dl {
    margin: 0; display: grid; grid-template-columns: 96px 1fr;
    gap: 5px 12px; font-size: 13px;
  }
  .details dt {
    color: var(--ink-soft); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .12em;
    align-self: center;
  }
  .details dd { margin: 0; font-variant-numeric: tabular-nums; }
  .details .notes {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-size: 13px; line-height: 1.5;
  }
  .details .notes strong {
    display: block; font-size: 10px; text-transform: uppercase;
    letter-spacing: .18em; color: var(--terra-dk); margin-bottom: 4px;
  }
  .details .empty {
    color: var(--ink-soft); font-size: 13px; font-style: italic;
  }

  .legend-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px;
    font-size: 12px;
  }
  .legend-grid .sw { display: flex; align-items: center; gap: 8px; }
  .legend-grid .sw .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,.25);
  }
  .legend-grid .sw .nast-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #f0d56a; border: 1px solid var(--moss-dk);
    display: grid; place-items: center;
    font-size: 7px; color: var(--moss-dk); font-weight: 700;
  }

  /* ============================================================
   *   PLANTS VIEW
   * ============================================================ */
  .plants-toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 14px;
  }
  .plants-toolbar .chips {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .chip {
    appearance: none; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink-soft);
    padding: 5px 11px; font: inherit; font-size: 12px;
    border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-soft); }
  .chip.is-active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .chip .chip-dot {
    width: 9px; height: 9px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.4);
  }
  .chip:not(.is-active) .chip-dot {
    border-color: rgba(0,0,0,.2);
  }
  .plants-search {
    flex: 1 1 200px;
    appearance: none;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 14px; font: inherit; font-size: 13px;
    background: var(--paper); color: var(--ink);
    min-width: 0;
  }
  .plants-search:focus { outline: none; border-color: var(--ink-soft); }

  .plants-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .plant-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .plant-card::before {
    content: ""; position: absolute;
    top: 0; left: 0; bottom: 0; width: 4px;
    background: var(--card-color, var(--ink));
  }
  .plant-card .pc-head {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px;
  }
  .plant-card .pc-disc {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--card-color); color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
    border: 1.5px solid rgba(0,0,0,.18);
    flex: none;
  }
  .plant-card.nast-card .pc-disc {
    background: #f0d56a; color: var(--moss-dk);
    border: 1.5px solid var(--moss-dk);
  }
  .plant-card h4.pc-name {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 20px; line-height: 1.1; margin: 0;
  }
  .plant-card .pc-var {
    font-size: 11px; color: var(--ink-mute);
    font-style: italic;
    font-family: "Cormorant Garamond", Georgia, serif;
  }
  .plant-card .pc-fam {
    font-size: 10px; text-transform: uppercase; letter-spacing: .15em;
    color: var(--ink-soft);
  }
  .plant-card .pc-row {
    display: grid; grid-template-columns: 64px 1fr; gap: 4px 10px;
    font-size: 12px; padding: 4px 0;
    border-top: 1px dashed var(--line-soft);
  }
  .plant-card .pc-row .k {
    color: var(--ink-mute); font-size: 10px;
    text-transform: uppercase; letter-spacing: .1em;
    padding-top: 2px;
  }
  .plant-card .pc-row .v { color: var(--ink); }
  .plant-card .pc-notes {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--line-soft);
    font-size: 12px; color: var(--ink-soft); line-height: 1.5;
  }
  .plant-card .pc-qty {
    margin-left: auto;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px; line-height: 1; color: var(--terra-dk);
  }
  .plant-card .pc-qty small {
    font-family: ui-sans-serif, sans-serif;
    font-size: 10px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: .1em;
    display: block; line-height: 1;
  }

  /* ============================================================
   *   CALENDAR VIEW
   * ============================================================ */
  .cal-header {
    display: flex; flex-wrap: wrap; justify-content: space-between;
    align-items: flex-end; gap: 16px;
    margin-bottom: 16px;
  }
  .cal-header .location {
    display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap;
  }
  .cal-header h2 {
    font-size: 24px; margin: 0;
  }
  .cal-header .zone {
    font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--terra-dk);
    background: var(--bg-2); padding: 4px 10px; border-radius: 4px;
  }
  .frost-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft);
  }
  .frost-line .frost-tick {
    width: 1px; height: 14px; background: var(--terra-dk);
    margin-right: 2px;
  }

  .cal-legend {
    display: flex; flex-wrap: wrap; gap: 12px 18px;
    font-size: 11.5px; margin-bottom: 16px;
  }
  .cal-legend .item { display: flex; align-items: center; gap: 6px; }
  .cal-legend .sw {
    width: 22px; height: 10px; border-radius: 3px;
    border: 1px solid rgba(0,0,0,.18);
  }

  .cal-table {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cal-months {
    display: grid;
    grid-template-columns: 200px repeat(12, 1fr);
    background: var(--paper-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    color: var(--ink-soft); text-transform: uppercase;
    letter-spacing: .1em;
  }
  .cal-months > div {
    padding: 8px 10px; text-align: center;
    border-right: 1px solid var(--line-soft);
  }
  .cal-months > div:first-child { text-align: left; }
  .cal-months > div:last-child { border-right: 0; }

  .cal-rows-wrap {
    position: relative;
  }
  /* frost overlay lines spanning all rows */
  .cal-frost {
    position: absolute; top: 0; bottom: 0; width: 0;
    border-left: 1.5px dashed var(--terra-dk);
    pointer-events: none; z-index: 3;
  }
  .cal-frost .lbl {
    position: absolute; top: 4px; left: 4px;
    font-size: 9.5px; color: var(--terra-dk);
    background: var(--paper); padding: 1px 5px;
    border-radius: 3px; white-space: nowrap;
    font-family: ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: .08em;
  }

  .cal-section {
    display: grid; grid-template-columns: 200px 1fr;
    background: var(--paper-2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line-soft);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 12px;
    text-transform: uppercase; letter-spacing: .18em;
    color: var(--terra-dk);
  }
  .cal-section > div {
    padding: 7px 12px;
  }
  .cal-section .sec-name {
    font-style: italic;
  }

  .cal-row {
    display: grid; grid-template-columns: 200px 1fr;
    border-bottom: 1px solid var(--line-soft);
    align-items: center;
    background: var(--paper);
  }
  .cal-row:nth-child(even) { background: rgba(245, 235, 205, .35); }
  .cal-row:hover { background: rgba(255, 240, 200, .55); }
  .cal-row .cal-label {
    padding: 6px 12px;
    font-size: 12.5px;
    display: flex; align-items: center; gap: 6px;
    border-right: 1px solid var(--line-soft);
  }
  .cal-row .cal-label .dot {
    width: 8px; height: 8px; border-radius: 50%; flex: none;
    border: 1px solid rgba(0,0,0,.2);
  }
  .cal-row .cal-label .lname {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cal-track {
    position: relative; height: 28px;
    background-image: linear-gradient(90deg,
      transparent calc(100%/12 - 1px),
      rgba(0,0,0,.05) calc(100%/12 - 1px),
      rgba(0,0,0,.05) calc(100%/12),
      transparent calc(100%/12));
    background-size: calc(100%/12) 100%;
    background-repeat: repeat-x;
  }
  .cal-bar {
    position: absolute; top: 5px; height: 18px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,.18);
    font-size: 9px; color: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    text-transform: uppercase; letter-spacing: .04em;
    overflow: hidden;
    cursor: default;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
  }
  .cal-bar[data-kind="indoor"]    { background: var(--cal-indoor); }
  .cal-bar[data-kind="direct"]    { background: var(--cal-direct); color: white; }
  .cal-bar[data-kind="transplant"]{ background: var(--cal-transplant); color: white; }
  .cal-bar[data-kind="harvest"]   { background: var(--cal-harvest); color: white; }
  .cal-bar[data-kind="bloom"]     { background: var(--cal-bloom); }
  .cal-bar[data-kind="harden"]    { background: var(--cal-harden); }
  .cal-bar:hover { filter: brightness(.95); }

  /* ============================================================
   *   FOOTER
   * ============================================================ */
  footer.app {
    max-width: 1240px; margin: 0 auto; padding: 12px 24px 32px;
    color: var(--ink-soft); font-size: 12px;
    border-top: 1px solid var(--line-soft);
    display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }

  /* small screens */
  @media (max-width: 720px) {
    .cal-months { grid-template-columns: 110px repeat(12, 1fr); font-size: 9px; }
    .cal-row { grid-template-columns: 110px 1fr; }
    .cal-section { grid-template-columns: 110px 1fr; }
    .schem-row { grid-template-columns: 1fr; }
    .row-head { margin-bottom: 6px; }
    .track   { flex-wrap: wrap; }
    .cluster { flex-wrap: wrap; }
    .row-body { overflow-x: visible; }
  }

  /* ── Expert chat tab ───────────────────────────────── */
  .expert-wrap { display:flex; flex-direction:column; height:calc(100vh - 170px); max-width:760px; margin:0 auto; }
  .expert-key-bar { display:flex; gap:8px; align-items:center; padding:10px 14px; background:var(--paper); border:1px solid var(--line); border-radius:8px; margin:0 0 12px; }
  .expert-key-bar label { font-size:13px; color:var(--ink-soft); white-space:nowrap; }
  .expert-key-bar input { flex:1; padding:6px 10px; border:1px solid var(--line); border-radius:6px; background:var(--bg); color:var(--ink); font-size:13.5px; font-family:inherit; }
  .expert-key-bar input:focus { outline:none; border-color:var(--moss); }
  .expert-key-bar button { padding:6px 14px; background:var(--moss); color:#fff; border:none; border-radius:6px; font-size:13.5px; cursor:pointer; white-space:nowrap; }
  .expert-key-bar button:hover { background:var(--moss-dk); }
  .expert-chat { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding:4px 0 16px; }
  .expert-empty { text-align:center; color:var(--ink-mute); font-style:italic; margin:auto; padding:48px 20px; max-width:380px; line-height:1.6; }
  .expert-msg { display:flex; flex-direction:column; max-width:82%; }
  .expert-msg.user { align-self:flex-end; align-items:flex-end; }
  .expert-msg.assistant { align-self:flex-start; align-items:flex-start; }
  .expert-bubble { padding:10px 14px; border-radius:12px; font-size:14.5px; line-height:1.6; }
  .expert-msg.user .expert-bubble { background:var(--terra); color:#fff; border-bottom-right-radius:3px; }

  .weather-src { margin-left:auto; font-size:11px; color:var(--ink-mute); font-style:italic; }

/* helper: make plant instance referencing PLANT_INFO */
let _pid = 0;
function p(name, opts) {
  return { id: 'p' + (++_pid), name, ...(opts || {}) };
}

/* ============================================================
 *   LAYOUT HELPERS — produce plant placements with (x,y) in inches.
 *   Inches are absolute within the bed: x = E-W from west edge,
 *   y = N-S from north edge. Rendered via SVG viewBox so spacing
 *   is true-to-scale across the whole diagram.
 * ============================================================ */

function line(y, items, opts) {
  opts = opts || {};
  const defaultSp = opts.sp != null ? opts.sp : 18;
  let x = 0;
  const out = items.map((it, i) => {
    if (i > 0) x += (it.after != null ? it.after : defaultSp);
    return Object.assign(p(it.n, it.opts), { x: x, y: y });
  });
  if (opts.centerX != null && out.length > 1) {
    const span = out[out.length-1].x - out[0].x;
    const shift = opts.centerX - span/2 - out[0].x;
    out.forEach(o => o.x += shift);
  } else if (opts.startX != null && out.length) {
    const shift = opts.startX - out[0].x;
    out.forEach(o => o.x += shift);
  }
  return out;
}
function plantAt(name, x, y, opts) {
  return Object.assign(p(name, opts), { x: x, y: y });
}

const $ = (s, root) => (root || document).querySelector(s);
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.setAttribute('style', attrs[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children])
    .forEach(c => c != null && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

/* index all plants in all beds for detail lookup */
const PLANT_INDEX = {};
function indexPlants() {
  for (const bedKey in BEDS) {
    const bed = BEDS[bedKey];
    if (bed.plants) {
      bed.plants.forEach((pl, i) => {
        pl._bed = bedKey; pl._idx = i;
        PLANT_INDEX[pl.id] = pl;
      });
    }
    if (bed.bags) {
      bed.bags.forEach((bag, bi) => {
        bag.plant._bed = bedKey; bag.plant._bag = bag.id; bag.plant._idx = bi;
        PLANT_INDEX[bag.plant.id] = bag.plant;
      });
    }
  }
}
indexPlants();

/* unique plant name → list of placements */
const PLANT_PLACEMENTS = {};
Object.values(PLANT_INDEX).forEach(pl => {
  (PLANT_PLACEMENTS[pl.name] = PLANT_PLACEMENTS[pl.name] || []).push(pl);
});

function plantQty(name) { return (PLANT_PLACEMENTS[name] || []).length; }
function plantBeds(name) {
  const beds = {};
  (PLANT_PLACEMENTS[name] || []).forEach(pl => {
    beds[pl._bed] = (beds[pl._bed] || 0) + 1;
  });
  return beds;
}
function bedTitle(k) { return BEDS[k] ? BEDS[k].title : k; }

  document.querySelectorAll('#toptabs button').forEach(b => {
    b.classList.toggle('is-active', b.dataset.view === activeView);
    b.onclick = () => {
      activeView = b.dataset.view;
      activePlantId = null;
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });

  });
  $('#plantCount').textContent = Object.keys(PLANT_INFO).length + ' kinds';
}

  if (activeView === 'map') renderMap(view);
  else if (activeView === 'plants') renderPlants(view);
  else if (activeView === 'calendar') renderCalendar(view);
  else if (activeView === 'expert') renderExpert(view);
}

/* ============================================================
 *   RENDER: MAP VIEW
 * ============================================================ */
function renderMap(root) {
  renderWeatherWidget(root);

  /* sub-tabs */
  const sub = el('div', { class: 'subtabs' });
  const bedOrder = ['left','middle','right','unfenced','bags'];
  const subNames = { left:'Left Bed', middle:'Middle Bed', right:'Right Bed', unfenced:'Unfenced', bags:'Grow Bags' };
  const subRoman = { left:'i.', middle:'ii.', right:'iii.', unfenced:'iv.', bags:'v.' };
  bedOrder.forEach(k => {
    const b = el('button', {
      class: k === activeBed ? 'is-active' : '',
      onclick: () => { activeBed = k; activePlantId = null; renderAll(); },
    });
    b.innerHTML = `<span class="sub-em">${subRoman[k]}</span>${subNames[k]}`;
    sub.appendChild(b);
  });
  root.appendChild(sub);

  /* two-column grid */
  const grid = el('div', { class: 'map-grid' });
  const mainCol = el('div');
  const side = el('aside', { class: 'side' });
  grid.appendChild(mainCol); grid.appendChild(side);
  root.appendChild(grid);

  const bed = BEDS[activeBed];

  /* bed head */
  const head = el('div', { class: 'bed-head' });
  head.appendChild(el('h2', { class: 'serif' }, bed.title));
  head.appendChild(el('span', { class: 'dims mono' }, bed.dims));
  head.appendChild(el('p', { class: 'lead' }, bed.lead));
  mainCol.appendChild(head);

  /* totals */
  const totals = el('div', { class: 'totals' });
  bed.totals.forEach(({k,v}) => {
    const d = el('div');
    d.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
    totals.appendChild(d);
  });
  mainCol.appendChild(totals);

  /* schematic */
  const card = el('div', { class: 'diagram-card' });
  const frame = el('div', { class: 'diagram-frame' });
  frame.appendChild(el('span', { class: 'ew-tick w' }, 'W'));
  frame.appendChild(el('span', { class: 'ew-tick e' }, 'E'));

  const schem = el('div', { class: 'schem' });
  if (activeBed === 'bags')           renderJsxBags(schem, bed);
  else if (activeBed === 'middle')    renderBedSVG(schem, bed);
  else                                renderJsxBed(schem, bed, activeBed);

  frame.appendChild(schem);
  card.appendChild(frame);
  mainCol.appendChild(card);

  /* side panels */
  side.appendChild(renderDetailsPanel());
  side.appendChild(renderLegendPanel());
  side.appendChild(renderRowIndexPanel(bed));
}

function renderBagsSchem(schem, bed) {

      : info.fam === 'root' ? 'root' : info.fam === 'allium' ? 'alli'

                'stroke="var(--fam-color)" stroke-width="1.8" stroke-linejoin="round"/>' +
          '<path d="M 16 18 Q 16 12 22 12 L 38 12 Q 44 12 44 18" ' +
                'fill="none" stroke="var(--fam-color)" stroke-width="1.8" stroke-linecap="round"/>' +
          '<text x="30" y="46" text-anchor="middle" dominant-baseline="central" ' +

/* ============================================================
 *   RENDER: BED SVG (proportional planting diagram)
 *   - viewBox in inches → spacing renders true-to-scale.
 *   - Each plant is an SVG <g> with circle + code; click/hover
 *     wires to the detail panel via setActivePlant().
 * ============================================================ */
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* family → plant disc radius (in inches) and font size */
function plantRadius(name, info) {
  if (name === 'Nasturtium') return 3.5;
  if (!info) return 5;
  switch (info.fam) {
    case 'flower':   return name === 'Sunflower' ? 6.5 : 4.5;
    case 'tomato':   return 6.5;
    case 'pepper':   return 5.5;
    case 'squash':   return 7;
    case 'cucumber': return 5.5;
    case 'brassica': return 5;
    case 'root':     return 3;
    case 'allium':   return 3;
    case 'herb':     return 4;
    case 'berry':    return 5.5;
    case 'cane':     return 4.5;
    case 'legume':   return 4.5;
    default:         return 5;
  }
}

function plantCircleColors(name, info) {
  if (name === 'Nasturtium') {
    return { fill: '#f5dc7a', stroke: '#364a23', text: '#364a23' };
  }
  const famVar = info && {
    tomato:'tom', pepper:'pep', cucumber:'cuke', brassica:'bras',
    root:'root', allium:'alli', squash:'squash', herb:'herb',
    flower:'flw', berry:'berry', cane:'cane', legume:'legume',
  }[info.fam] || 'tom';
  const c = 'var(--c-' + famVar + ')';
  return {
    fill: 'color-mix(in srgb, ' + c + ' 16%, #fbf6ea)',
    stroke: c,
    text: c,
  };
}

function renderBedSVG(schem, bed) {
  const wrap = el('div', { class: 'bed-svg-wrap' });
  /* compass + dims strip */
  const meta = el('div', { class: 'bed-svg-meta' });
  meta.innerHTML =
    '<span class="bed-compass">N <span class="arrow">↑</span></span>' +
    '<span class="bed-axis-x">W <span class="rule"></span> ' + bed.ewIn + '″ E-W <span class="rule"></span> E</span>' +
    '<span class="bed-axis-y">' + bed.nsIn + '″ N-S</span>';
  wrap.appendChild(meta);

  const svg = svgEl('svg', {
    class: 'bed-svg',
    viewBox: '0 0 ' + bed.ewIn + ' ' + bed.nsIn,
    preserveAspectRatio: 'xMidYMid meet',
    style: 'aspect-ratio: ' + bed.ewIn + ' / ' + bed.nsIn + ';',
  });

  /* grid background (every ~50″) */
  const gridStep = 50;
  for (let x = 0; x <= bed.ewIn; x += gridStep) {
    svg.appendChild(svgEl('line', {
      x1: x, y1: 0, x2: x, y2: bed.nsIn, class: 'grid-line',
    }));
  }
  for (let y = 0; y <= bed.nsIn; y += gridStep) {
    svg.appendChild(svgEl('line', {
      x1: 0, y1: y, x2: bed.ewIn, y2: y, class: 'grid-line',
    }));
  }

  /* zone bands (right bed splits into veg / hedge / strip) */
  (bed.zones || []).forEach((z, zi) => {
    if (zi > 0) {
      svg.appendChild(svgEl('line', {
        x1: z.x0, y1: 0, x2: z.x0, y2: bed.nsIn, class: 'zone-line',
      }));
    }
    if (z.label) {
      const t = svgEl('text', {
        x: (z.x0 + z.x1) / 2, y: bed.nsIn - 3,
        'text-anchor': 'middle', class: 'zone-label',
        'font-size': 5,
      });
      t.textContent = z.label;
      svg.appendChild(t);
    }
  });

  /* path / gap bands */
  (bed.bands || []).forEach(b => {
    const x0 = b.xRange ? b.xRange[0] : 0;
    const x1 = b.xRange ? b.xRange[1] : bed.ewIn;
    svg.appendChild(svgEl('rect', {
      x: x0, y: b.y0, width: x1 - x0, height: b.y1 - b.y0,
      class: 'band band-' + b.kind,
    }));
    if (b.label) {
      const t = svgEl('text', {
        x: (x0 + x1) / 2, y: (b.y0 + b.y1) / 2,
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        class: 'band-label band-' + b.kind + '-label',
        'font-size': 5.2,
      });
      t.textContent = b.label;
      svg.appendChild(t);
    }
  });

  /* row labels (above each row's y) */
  (bed.rows || []).forEach(r => {
    if (r.col != null) return; /* cane / column-row label handled separately */
    const t = svgEl('text', {
      x: 5, y: r.y - 7,
      class: 'row-label', 'font-size': 5.5,
    });
    t.textContent = (r.letter ? r.letter + ' · ' : '') + r.label;
    svg.appendChild(t);
    if (r.dim) {
      const t2 = svgEl('text', {
        x: 5, y: r.y - 1.5,
        class: 'row-dim', 'font-size': 4,
      });
      t2.textContent = r.dim;
      svg.appendChild(t2);
    }
  });

  /* cane / column labels for middle bed (vertical at top of column) */
  (bed.rows || []).forEach(r => {
    if (r.col == null) return;
    const tx = r.col;
    const t = svgEl('text', {
      x: tx, y: 14,
      'text-anchor': 'middle',
      class: 'row-label', 'font-size': 5.5,
    });
    t.textContent = r.letter + ' · ' + r.label;
    svg.appendChild(t);
    if (r.dim) {
      const t2 = svgEl('text', {
        x: tx, y: 20,
        'text-anchor': 'middle',
        class: 'row-dim', 'font-size': 4,
      });
      t2.textContent = r.dim;
      svg.appendChild(t2);
    }
  });

  /* visual sub-block hint for the BW 2×2 in the left bed */
  if (bed === BEDS.left) {
    const bw = bed.plants.filter(p => p.name === 'Brandywine');
    if (bw.length >= 4) {
      const xs = bw.map(p => p.x), ys = bw.map(p => p.y);
      const x0 = Math.min(...xs) - 10, x1 = Math.max(...xs) + 10;
      const y0 = Math.min(...ys) - 10, y1 = Math.max(...ys) + 10;
      svg.appendChild(svgEl('rect', {
        x: x0, y: y0, width: x1 - x0, height: y1 - y0,
        class: 'sub-block',
      }));
      const t = svgEl('text', {
        x: x0 + 2, y: y1 - 2,
        class: 'sub-block-label', 'font-size': 3.5,
      });
      t.textContent = 'BW 2×2 · 30″ × 48″';
      svg.appendChild(t);
    }
    /* pepper block outline */
    const pep = bed.plants.filter(p =>
      ['Bell pepper','Shishito pepper','Basil'].includes(p.name) &&
      p.y >= 175 && p.y <= 210
    );
    if (pep.length) {
      const xs = pep.map(p => p.x), ys = pep.map(p => p.y);
      const x0 = Math.min(...xs) - 9, x1 = Math.max(...xs) + 9;
      const y0 = Math.min(...ys) - 9, y1 = Math.max(...ys) + 9;
      svg.appendChild(svgEl('rect', {
        x: x0, y: y0, width: x1 - x0, height: y1 - y0,
        class: 'sub-block pepper-block',
      }));
      const t = svgEl('text', {
        x: x0 + 2, y: y0 + 5,
        class: 'sub-block-label', 'font-size': 3.5,
      });
      t.textContent = '2×3 block';
      svg.appendChild(t);
    }
  }

  /* plants */
  (bed.plants || []).forEach(pl => {
    if (pl.isBand) { svg.appendChild(makeCarrotBand(pl)); return; }
    svg.appendChild(makePlantNode(pl));
  });

  wrap.appendChild(svg);
  schem.appendChild(wrap);
}

function makePlantNode(pl) {
  const info = PLANT_INFO[pl.name];
  const r = plantRadius(pl.name, info);
  const colors = plantCircleColors(pl.name, info);
  const g = svgEl('g', {
    class: 'plant-g' + (pl.id === activePlantId ? ' is-active' : ''),
    transform: 'translate(' + pl.x + ',' + pl.y + ')',
    'data-id': pl.id,
  });
  g.appendChild(svgEl('circle', {
    r: r, fill: colors.fill, stroke: colors.stroke,
    'stroke-width': 0.9,
  }));
  const t = svgEl('text', {
    'text-anchor': 'middle', 'dominant-baseline': 'central',
    fill: colors.text, 'font-size': r * 0.7, 'font-weight': 700,
    class: 'plant-code',
  });
  t.textContent = info ? info.code : '?';
  g.appendChild(t);
  g.addEventListener('mouseenter', () => setActivePlant(pl.id));
  g.addEventListener('click', () => setActivePlant(pl.id, true));
  return g;
}

function makeCarrotBand(pl) {
  const w = pl.bandW || 200, h = pl.bandH || 10;
  const g = svgEl('g', {
    class: 'plant-g carrot-band-g' + (pl.id === activePlantId ? ' is-active' : ''),
    'data-id': pl.id,
  });
  g.appendChild(svgEl('rect', {
    x: pl.x - w/2, y: pl.y - h/2, width: w, height: h,
    class: 'carrot-band-rect', rx: 1.5, ry: 1.5,
  }));
  const t = svgEl('text', {
    x: pl.x, y: pl.y + 0.5,
    'text-anchor': 'middle', 'dominant-baseline': 'central',
    class: 'carrot-band-label', 'font-size': 4.5,
  });
  t.textContent = 'CARROTS · direct sow · thin to 3″';
  g.appendChild(t);
  g.addEventListener('mouseenter', () => setActivePlant(pl.id));
  g.addEventListener('click', () => setActivePlant(pl.id, true));
  return g;
}

function setActivePlant(id, force) {
  activePlantId = id;
  document.querySelectorAll('.plant').forEach(p => {
    p.classList.toggle('is-active', p.dataset.id === id);
  });
  renderDetails();
}

function renderDetailsPanel() {
  const panel = el('section', { class: 'panel details' });
  panel.appendChild(el('h3', null, 'Plant Detail'));
  panel.appendChild(el('div', { id: 'details' }));
  setTimeout(renderDetails, 0);
  return panel;
}

function renderDetails() {
  const wrap = $('#details');
  if (!wrap) return;
  if (!activePlantId || !PLANT_INDEX[activePlantId]) {
    wrap.innerHTML = `<p class="empty">Hover or tap any plant on the diagram to see its name, spacing, and care notes.</p>`;
    return;
  }
  const pl = PLANT_INDEX[activePlantId];
  const info = PLANT_INFO[pl.name] || {};
  const fam = FAM[info.fam] || {};
  const isNast = pl.name === 'Nasturtium';
  const qty = plantQty(pl.name);
  wrap.innerHTML = `
    <h4 class="name serif">${pl.name}</h4>
    <div class="fam"><span class="dot" style="background:${isNast ? '#f0d56a' : fam.color}; border-color:${isNast ? 'var(--moss-dk)' : 'rgba(0,0,0,.25)'}"></span>${fam.label || ''}${pl.zone ? ' · ' + pl.zone : ''}</div>
    <dl>
      <dt>Variety</dt><dd>${info.variety || '—'}</dd>
      <dt>Sun</dt><dd>${info.sun || '—'}</dd>
      <dt>Water</dt><dd>${info.water || '—'}</dd>
      <dt>Soil</dt><dd>${info.soil || '—'}</dd>
      <dt>Maturity</dt><dd>${info.days || '—'}</dd>
      <dt>Spacing</dt><dd>${info.spacing || '—'}</dd>
      <dt>Bed</dt><dd>${bedTitle(pl._bed)}</dd>
      <dt>Total qty</dt><dd>${qty} plant${qty===1?'':'s'}</dd>
    </dl>
    <div class="notes">
      <strong>Care notes</strong>
      ${info.care || ''}
    </div>
  `;
}

function renderLegendPanel() {
  const panel = el('section', { class: 'panel' });
  panel.appendChild(el('h3', null, 'Plant Families'));
  const grid = el('div', { class: 'legend-grid' });
  grid.innerHTML = `
    <div class="sw"><span class="dot" style="background:var(--c-tom)"></span>Tomatoes</div>
    <div class="sw"><span class="dot" style="background:var(--c-pep)"></span>Peppers</div>
    <div class="sw"><span class="dot" style="background:var(--c-cuke)"></span>Cucumbers</div>
    <div class="sw"><span class="dot" style="background:var(--c-bras)"></span>Brassicas</div>
    <div class="sw"><span class="dot" style="background:var(--c-root)"></span>Roots</div>
    <div class="sw"><span class="dot" style="background:var(--c-alli)"></span>Alliums</div>
    <div class="sw"><span class="dot" style="background:var(--c-squash)"></span>Squash</div>
    <div class="sw"><span class="dot" style="background:var(--c-herb)"></span>Herbs</div>
    <div class="sw"><span class="dot" style="background:var(--c-flw)"></span>Flowers</div>
    <div class="sw"><span class="dot" style="background:var(--c-berry)"></span>Berries</div>
    <div class="sw"><span class="nast-dot">N</span>Nasturtium (companion)</div>
  `;

  return panel;
}

function renderRowIndexPanel(bed) {
  const panel = el('section', { class: 'panel' });
  panel.appendChild(el('h3', null, bed.bags ? 'Bag inventory' : 'Rows — N → S'));
  const ol = el('ol', { style: 'margin:0; padding:0; list-style:none; font-size:12px;' });

  if (bed.bags) {
    bed.bags.forEach(bag => {
      const li = el('li', { style: 'padding:7px 0; border-bottom:1px dashed var(--line-soft); display:grid; grid-template-columns:32px 1fr auto; gap:8px;' });
      li.innerHTML = `<span class="mono" style="color:var(--terra-dk);">${bag.id}</span><span>${bag.plant.name}</span><span class="mono" style="color:var(--ink-mute); font-size:11px;">${bag.n} pl.</span>`;
      ol.appendChild(li);
    });
  } else if (bed.rows) {
    bed.rows.forEach(r => {
      const li = el('li', { style: 'padding:7px 0; border-bottom:1px dashed var(--line-soft); display:grid; grid-template-columns:24px 1fr; gap:8px;' });
      li.innerHTML =
        `<span class="serif" style="font-style:italic; color:var(--terra-dk);">${r.letter || '·'}.</span>` +
        `<div><div>${r.label}</div>` +
        (r.dim ? `<div class="mono" style="color:var(--ink-mute); font-size:10.5px; margin-top:2px; line-height:1.35;">${r.dim}</div>` : '') +
        `</div>`;
      ol.appendChild(li);
    });
  }

  panel.appendChild(ol);
  return panel;
}

/* ============================================================
 *   RENDER: PLANTS VIEW
 * ============================================================ */
function renderPlants(root) {
  /* Toolbar */
  const bar = el('div', { class: 'plants-toolbar' });
  const chips = el('div', { class: 'chips' });
  const families = ['all', ...new Set(Object.values(PLANT_INFO).map(p => p.fam))];
  families.forEach(f => {
    const c = el('button', {
      class: 'chip' + (activeFamilyFilter === f ? ' is-active' : ''),
      onclick: () => { activeFamilyFilter = f; renderAll(); },
    });
    if (f === 'all') c.textContent = 'All';
    else {
      c.appendChild(el('span', { class: 'chip-dot', style: `background:${FAM[f].color}` }));
      c.appendChild(document.createTextNode(FAM[f].label));
    }
    chips.appendChild(c);
  });
  bar.appendChild(chips);
  const search = el('input', {
    class: 'plants-search', type: 'search',
    placeholder: 'Search plants…',
    value: plantSearchQ,
  });
  search.addEventListener('input', e => {
    plantSearchQ = e.target.value.toLowerCase();
    rerenderGrid();
  });
  bar.appendChild(search);
  root.appendChild(bar);

  /* Grid */
  const grid = el('div', { class: 'plants-grid', id: 'plantsGrid' });
  root.appendChild(grid);
  rerenderGrid();
}

function rerenderGrid() {
  const grid = $('#plantsGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const entries = Object.entries(PLANT_INFO)
    .filter(([n, info]) => activeFamilyFilter === 'all' || info.fam === activeFamilyFilter)
    .filter(([n]) => !plantSearchQ || n.toLowerCase().includes(plantSearchQ))
    .sort((a, b) => {
      /* sort by family then name */
      if (a[1].fam !== b[1].fam) return a[1].fam.localeCompare(b[1].fam);
      return a[0].localeCompare(b[0]);
    });

  entries.forEach(([name, info]) => grid.appendChild(plantCard(name, info)));

  if (entries.length === 0) {
    grid.appendChild(el('p', { style: 'color:var(--ink-soft); font-style:italic; padding: 20px;' }, 'No plants match that filter.'));
  }
}

function plantCard(name, info) {
  const fam = FAM[info.fam];
  const qty = plantQty(name);
  const beds = plantBeds(name);
  const card = el('div', {
    class: 'plant-card' + (name === 'Nasturtium' ? ' nast-card' : ''),
    style: `--card-color: ${fam.color}`,
  });

  const head = el('div', { class: 'pc-head' });
  const disc = el('div', { class: 'pc-disc' }, info.code);
  head.appendChild(disc);
  const title = el('div', { style: 'flex:1; min-width:0;' });
  title.appendChild(el('h4', { class: 'pc-name' }, name));
  title.appendChild(el('div', { class: 'pc-var' }, info.variety));
  title.appendChild(el('div', { class: 'pc-fam' }, fam.label));
  head.appendChild(title);
  if (qty > 0) {
    const q = el('div', { class: 'pc-qty' });
    q.innerHTML = `${qty}<small>plant${qty===1?'':'s'}</small>`;
    head.appendChild(q);
  }
  card.appendChild(head);

  /* rows */
  const rowDef = [
    ['Sun', info.sun], ['Water', info.water], ['Soil', info.soil],
    ['Days', info.days], ['Spacing', info.spacing],
    ['Location', Object.entries(beds).map(([b,n])=>`${bedTitle(b)} (${n})`).join(', ') || '—'],
  ];
  rowDef.forEach(([k,v]) => {
    if (!v) return;
    const r = el('div', { class: 'pc-row' });
    r.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
    card.appendChild(r);
  });

  if (info.care) {
    const notes = el('div', { class: 'pc-notes' }, info.care);
    card.appendChild(notes);
  }
  return card;
}

/* ============================================================
 *   RENDER: CALENDAR VIEW
 * ============================================================ */
const FROST = { last: 5.33, first: 10.17 }; /* May 10 · Oct 5 */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderCalendar(root) {
  /* header */
  const head = el('div', { class: 'cal-header' });
  const left = el('div', { class: 'location' });
  left.appendChild(el('h2', { class: 'serif' }, 'Planting Calendar'));
  left.appendChild(el('span', { class: 'zone' }, 'Greenfield, MA 01301 · Zone 5b/6a'));
  head.appendChild(left);
  const right = el('div', { style: 'display:flex; gap:18px; flex-wrap:wrap;' });
  right.appendChild(makeFrostNote('Last frost', '≈ May 10'));
  right.appendChild(makeFrostNote('First frost', '≈ Oct 5'));
  right.appendChild(makeFrostNote('Growing season', '≈ 148 days'));
  head.appendChild(right);
  root.appendChild(head);

  /* legend */
  const legend = el('div', { class: 'cal-legend' });
  legend.innerHTML = `
    <div class="item"><span class="sw" style="background: var(--cal-indoor)"></span>Start indoors</div>
    <div class="item"><span class="sw" style="background: var(--cal-harden)"></span>Harden off</div>
    <div class="item"><span class="sw" style="background: var(--cal-transplant)"></span>Transplant out</div>
    <div class="item"><span class="sw" style="background: var(--cal-direct)"></span>Direct sow</div>
    <div class="item"><span class="sw" style="background: var(--cal-harvest)"></span>Harvest</div>
    <div class="item"><span class="sw" style="background: var(--cal-bloom)"></span>Bloom / fruit</div>
  `;
  root.appendChild(legend);

  /* table */
  const table = el('div', { class: 'cal-table' });

  /* months header */
  const months = el('div', { class: 'cal-months' });
  months.appendChild(el('div', null, 'Plant'));
  MONTHS.forEach(m => months.appendChild(el('div', null, m)));
  table.appendChild(months);

  /* rows wrap with frost overlay */
  const rowsWrap = el('div', { class: 'cal-rows-wrap' });

  /* group plants by family for section dividers */
  const order = ['tomato','pepper','cucumber','squash','brassica','root','allium','herb','flower','berry'];
  const grouped = {};
  Object.entries(PLANT_INFO).forEach(([name, info]) => {
    (grouped[info.fam] = grouped[info.fam] || []).push([name, info]);
  });

  order.forEach(fam => {
    if (!grouped[fam]) return;
    const sec = el('div', { class: 'cal-section' });
    const fLabel = el('div', { class: 'sec-name' }, FAM[fam].label);
    fLabel.style.borderRight = '1px solid var(--line-soft)';
    sec.appendChild(fLabel);
    sec.appendChild(el('div'));
    rowsWrap.appendChild(sec);

    grouped[fam].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name, info]) => {
      rowsWrap.appendChild(calRow(name, info));
    });
  });

  /* frost overlays — span only the right portion (after the name col 200px) */
  /* We place them inside a wrapper that uses the same grid as cal-row */
  const overlay = el('div', { style: 'position:absolute; inset:0; pointer-events:none; display:grid; grid-template-columns:200px 1fr;' });
  overlay.appendChild(el('div'));
  const overTrack = el('div', { style: 'position:relative;' });
  [['last', FROST.last, '— last frost'], ['first', FROST.first, '— first frost']].forEach(([k, val, lbl]) => {
    const line = el('div', { class: 'cal-frost', style: `left:${pct(val)}` });
    line.appendChild(el('div', { class: 'lbl' }, lbl));
    overTrack.appendChild(line);
  });
  overlay.appendChild(overTrack);
  rowsWrap.appendChild(overlay);

  /* On small screens, override the overlay grid to match */
  /* (left column is 110px in mobile media query) — handle via CSS variable */

  table.appendChild(rowsWrap);
  root.appendChild(table);
}

function makeFrostNote(label, val) {
  const n = el('div', { class: 'frost-line' });
  n.innerHTML = `<span class="frost-tick"></span><span><strong>${label}</strong> ${val}</span>`;
  return n;
}

function pct(m) { return ((m - 1) / 12 * 100) + '%'; }

function calRow(name, info) {
  const row = el('div', { class: 'cal-row' });
  const fam = FAM[info.fam];
  const label = el('div', { class: 'cal-label' });
  label.innerHTML = `<span class="dot" style="background:${fam.color}"></span><span class="lname" title="${name}">${name}</span>`;
  row.appendChild(label);
  const track = el('div', { class: 'cal-track' });
  const order = ['indoor', 'harden', 'direct', 'transplant', 'harvest', 'bloom'];
  const cal = info.cal || {};
  Object.entries(cal).forEach(([kind, range]) => {
    if (!Array.isArray(range[0])) {
      track.appendChild(calBar(kind, range));
    } else {
      range.forEach(rng => track.appendChild(calBar(kind, rng)));
    }
  });
  row.appendChild(track);
  return row;
}

function calBar(kind, [start, end]) {
  const left = (start - 1) / 12 * 100;
  const width = (end - start) / 12 * 100;
  const bar = el('div', {
    class: 'cal-bar',
    'data-kind': kind,
    style: `left:${left}%; width:${width}%`,
    title: `${kind} · ${monthLabel(start)} → ${monthLabel(end)}`,
  });
  if (width > 6) bar.textContent = kind;
  return bar;
}

function monthLabel(decimal) {
  const m = Math.floor(decimal);
  const d = Math.round((decimal - m) * 30 + 1);
  return MONTHS[Math.min(11, m - 1)] + ' ' + Math.max(1, Math.min(30, d));
}

/* ============================================================
 *   WEATHER WIDGET  —  Open-Meteo, no API key needed
 *   Greenfield MA: 42.587°N 72.601°W
 * ============================================================ */
let weatherCache = null;

async function fetchWeather() {
  if (weatherCache) return weatherCache;
  /* past_days=7 + forecast_days=3 → 10 entries; first 7 are history, last 3 are forecast */
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=42.587&longitude=-72.601'
    + '&daily=precipitation_sum,et0_fao_evapotranspiration'
    + '&past_days=7&forecast_days=3'
    + '&timezone=America%2FNew_York';
  const resp = await fetch(url);
  const data = await resp.json();
  const precip = data.daily.precipitation_sum;
  const et0   = data.daily.et0_fao_evapotranspiration;
  const histP = precip.slice(0, 7);
  const foreP = precip.slice(7);
  const histE = et0.slice(0, 7);
  const rain7    = histP.reduce((a, b) => a + (b || 0), 0);
  const et0_7    = histE.reduce((a, b) => a + (b || 0), 0);
  const forecast = foreP.reduce((a, b) => a + (b || 0), 0);
  weatherCache = { rain7, et0_7, forecast };
  return weatherCache;
}

function renderWeatherWidget(root) {
  const widget = el('div', { class: 'weather-widget' });
  widget.appendChild(el('span', { class: 'weather-loading' }, ['Checking weather…']));
  root.insertBefore(widget, root.firstChild);

  fetchWeather().then(({ rain7, et0_7, forecast }) => {
    const rawDeficit = Math.max(0, et0_7 - rain7);
    const netDeficit = Math.max(0, rawDeficit - forecast);
    const mm2in = mm => (mm / 25.4).toFixed(1) + '″';

    let statusClass, rec;
    if (forecast >= rawDeficit * 0.8 || netDeficit < 6) {
      statusClass = 'ok';
      rec = forecast > 5
        ? `${mm2in(forecast)} rain coming — hold off on watering`
        : 'Garden is well watered — skip irrigation';
    } else if (netDeficit < 18) {
      statusClass = 'mild';
      rec = forecast > 5
        ? `${mm2in(forecast)} rain forecast; still need ~${mm2in(netDeficit)} more`
        : `Water ~${mm2in(netDeficit)}`;
    } else {
      statusClass = 'dry';
      rec = forecast > 5
        ? `${mm2in(forecast)} rain coming, but still short ~${mm2in(netDeficit)}`
        : `Water ~${mm2in(netDeficit)} — garden is thirsty`;
    }

    widget.className = 'weather-widget weather-' + statusClass;
    widget.innerHTML = '';
    const s = (k, v) => {
      const sp = el('span', { class: 'weather-stat' });
      sp.innerHTML = `<span class="wk">${k}</span><span class="wv">${v}</span>`;
      return sp;
    };
    widget.appendChild(s('7-day rain', mm2in(rain7)));
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(s('ET₀ demand', mm2in(et0_7)));
    if (forecast > 1) {
      widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
      widget.appendChild(s('3-day forecast', mm2in(forecast)));
    }
    widget.appendChild(el('span', { class: 'weather-sep' }, ['·']));
    widget.appendChild(el('span', { class: 'weather-rec' }, [rec]));
    widget.appendChild(el('span', { class: 'weather-src' }, ['Open-Meteo']));
  }).catch(() => widget.remove());
}

/* ============================================================
 *   RENDER: GARDEN EXPERT
 * ============================================================ */
let expertHistory = [];

function buildExpertSystemPrompt() {
  const lines = [
    'You are a knowledgeable, practical gardening expert advising Hannah and Dom about their vegetable and berry garden in Greenfield, Massachusetts (Zone 5b/6a). Last frost is around May 10; first frost around October 5.',
    '',
    'Their garden has five growing spaces:',
    '',
  ];

  for (const bedKey in BEDS) {
    const bed = BEDS[bedKey];
    lines.push(`### ${bed.title}`);
    lines.push(bed.dims);
    lines.push(bed.lead);

    if (bed.plants) {
      const counts = {};
      bed.plants.forEach(pl => { counts[pl.name] = (counts[pl.name] || 0) + 1; });
      lines.push('Plants: ' + Object.entries(counts).map(([n, c]) => c > 1 ? `${n} ×${c}` : n).join(' · '));
    }
    if (bed.bags) {
      lines.push('Grow bags: ' + bed.bags.map(b => `${b.plant.name} ×${b.n}`).join(' · '));
    }
    lines.push('');
  }

  lines.push('### Companion Planting Notes (from plant care data)');
  for (const name in PLANT_INFO) {
    const info = PLANT_INFO[name];
    if (info.care && (
      info.care.includes('compan') || info.care.includes('Compan') ||
      info.care.includes('trap') || info.care.includes('Trap') ||
      info.care.includes('attract') || info.care.includes('repel') ||
      info.care.includes('interplant') || info.care.includes('nitrogen') ||
      info.care.includes('Nasturtium') || info.care.includes('Basil')
    )) {
      lines.push(`- **${name}**: ${info.care}`);
    }
  }
  lines.push('');
  lines.push('Answer questions about timing, watering, companion planting, pest management, harvesting, and anything else related to this specific garden. Be specific — reference actual plant names and bed locations. Keep answers concise and actionable.');
  return lines.join('\n');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function markdownToHtml(text) {
  let s = escapeHtml(text);
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // unordered lists
  s = s.replace(/((?:^- .+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /,'')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  // paragraphs from double newlines
  s = '<p>' + s.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
  return s;
}

function renderExpert(root) {
  const savedKey = localStorage.getItem('expert_api_key') || '';

  const wrap = el('div', { class: 'expert-wrap' });

  /* API key bar */
  const keyBar = el('div', { class: 'expert-key-bar', style: savedKey ? 'display:none' : '' });
  keyBar.appendChild(el('label', {}, ['Anthropic API key']));
  const keyInput = el('input', { type: 'password', placeholder: 'sk-ant-…', autocomplete: 'off' });
  const keySave = el('button', {}, ['Save']);
  keySave.onclick = () => {
    const v = keyInput.value.trim();
    if (v) { localStorage.setItem('expert_api_key', v); keyBar.style.display = 'none'; }
  };
  keyBar.appendChild(keyInput);
  keyBar.appendChild(keySave);

  /* Chat area */
  const chat = el('div', { class: 'expert-chat' });

  function renderMessages() {
    chat.innerHTML = '';
    if (expertHistory.length === 0) {
      chat.appendChild(el('div', { class: 'expert-empty' }, [
        'Ask me anything about your garden — watering schedules, pest control, when to harvest, companion planting, what to do next…'
      ]));
      return;
    }
    expertHistory.forEach(msg => {
      const msgEl = el('div', { class: 'expert-msg ' + msg.role });
      const bubble = el('div', { class: 'expert-bubble' });
      bubble.innerHTML = markdownToHtml(msg.content);
      msgEl.appendChild(bubble);
      chat.appendChild(msgEl);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  renderMessages();

  /* Input row */
  const inputRow = el('div', { class: 'expert-input-row' });
  const textarea = el('textarea', { placeholder: 'Ask about your garden…', rows: '1' });
  const sendBtn = el('button', { class: 'expert-send' }, ['Ask']);

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  sendBtn.onclick = async () => {
    const key = localStorage.getItem('expert_api_key') || '';
    if (!key) { keyBar.style.display = ''; keyInput.focus(); return; }
    const text = textarea.value.trim();
    if (!text || sendBtn.disabled) return;

    textarea.value = '';
    textarea.style.height = '';
    sendBtn.disabled = true;

    expertHistory.push({ role: 'user', content: text });
    renderMessages();

    /* Thinking indicator */
    const thinkEl = el('div', { class: 'expert-msg assistant' });
    const thinkBubble = el('div', { class: 'expert-bubble' });
    thinkBubble.innerHTML = '<span class="expert-thinking-dot">●</span><span class="expert-thinking-dot">●</span><span class="expert-thinking-dot">●</span>';
    thinkEl.appendChild(thinkBubble);
    chat.appendChild(thinkEl);
    chat.scrollTop = chat.scrollHeight;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-7',
          max_tokens: 1024,
          system: buildExpertSystemPrompt(),
          messages: expertHistory,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        const msg = err.error?.message || `HTTP ${resp.status}`;
        if (resp.status === 401) localStorage.removeItem('expert_api_key');
        throw new Error(msg);
      }

      const data = await resp.json();
      expertHistory.push({ role: 'assistant', content: data.content[0].text });
    } catch(e) {
      expertHistory.push({ role: 'assistant', content: `⚠️ ${e.message}` });
    }

    sendBtn.disabled = false;
    renderMessages();
    setTimeout(() => textarea.focus(), 50);
  };

  inputRow.appendChild(textarea);
  inputRow.appendChild(sendBtn);

  wrap.appendChild(keyBar);
  wrap.appendChild(chat);
  wrap.appendChild(inputRow);
  root.appendChild(wrap);

  setTimeout(() => textarea.focus(), 50);
}

/* ============================================================
 *   INIT
 * ============================================================ */
renderAll();

/* keyboard nav for top tabs */
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const order = ['map','plants','calendar','expert'];
  const i = order.indexOf(activeView);
  if (e.key === 'ArrowRight' && e.altKey) { activeView = order[(i+1)%4]; renderAll(); }
  if (e.key === 'ArrowLeft' && e.altKey)  { activeView = order[(i-1+4)%4]; renderAll(); }
});
