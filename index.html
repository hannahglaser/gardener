<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hannah + Dom's Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23f5f0e8' stroke='%232d2d2d' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%232d2d2d' stroke-width='1.2' stroke-dasharray='4 3'/%3E%3Cline x1='32' y1='44' x2='32' y2='28' stroke='%234a2e0f' stroke-width='2' stroke-linecap='round'/%3E%3Cellipse cx='26' cy='28' rx='7' ry='5' fill='%233d7a2f' transform='rotate(-30 26 28)'/%3E%3Cellipse cx='38' cy='26' rx='7' ry='5' fill='%236b4c1e' transform='rotate(25 38 26)'/%3E%3Cline x1='20' y1='44' x2='44' y2='44' stroke='%232d2d2d' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  /* ============================================================
   *   TOKENS
   * ============================================================ */
  :root {
    --bg:        #f5efe1;
    --bg-2:      #ede4cf;
    --paper:     #fbf6ea;
    --paper-2:   #f3ecd6;
    --ink:       #2a2418;
    --ink-soft:  #6a5f48;
    --ink-mute:  #94886a;
    --line:      #c9bd9f;
    --line-soft: #ddd1b3;
    --terra:     #b96b3e;
    --terra-dk:  #8b4a26;
    --moss:      #4d6a35;
    --moss-dk:   #364a23;

    /* plant families */
    --c-tom:    #c44438;
    --c-pep:    #7b3f86;
    --c-cuke:   #3f6f95;
    --c-bras:   #3a8a7d;
    --c-root:   #d77a2c;
    --c-alli:   #8d8a82;
    --c-squash: #6a9438;
    --c-herb:   #2f5a2d;
    --c-flw:    #d9b13a;
    --c-berry:  #4a5d9a;
    --c-cane:   #a13e6e;
    --c-legume: #8d9243;
    --c-peren:  #5a7a52;
    --c-cover:  #7a9e6b;

    --shadow: 0 1px 0 rgba(120,90,40,.10), 0 12px 30px -18px rgba(80,55,15,.35);
    --shadow-sm: 0 1px 2px rgba(80,55,15,.10);

    /* calendar activity colors */
    --cal-indoor:    #ddc88a;
    --cal-harden:    #c8d2a6;
    --cal-transplant:#7fa55d;
    --cal-direct:    #c97a3f;
    --cal-harvest:   #4d6a35;
    --cal-bloom:     #d9b13a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(185, 107, 62, .04), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(77, 106, 53, .05), transparent 45%);
    background-attachment: fixed;
    overflow-x: clip;
  }
  .serif {
    font-family: "Cormorant Garamond", "Garamond", "Georgia", "Iowan Old Style", "Times New Roman", serif;
    font-weight: 500; letter-spacing: .01em;
  }
  .mono {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 12px; letter-spacing: .02em;
  }

  /* ============================================================
   *   HEADER
   * ============================================================ */
  header.app {
    max-width: 1240px; margin: 0 auto;
    padding: 26px 24px 0;
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .weather-corner { padding-top: 6px; color: var(--ink-mute); text-align: right; }
  .wc-line1 { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 13px; font-variant-numeric: tabular-nums; }
  .wc-icon { display: flex; align-items: center; }
  .wc-hilo { display: block; font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; opacity: 0.8; }
  .seal {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--ink);
    display: grid; place-items: center;
    box-shadow: var(--shadow); position: relative;
  }
  .seal::after {
    content:""; position: absolute; inset: 4px; border-radius: 50%;
    border: 1px dashed var(--line);
  }
  .seal svg { width: 24px; height: 24px; position: relative; }
  h1.title { font-size: 30px; margin: 0; letter-spacing: .005em; }
  .kicker {
    font-size: 11px; text-transform: uppercase; letter-spacing: .22em;
    color: var(--terra-dk); margin: 4px 0 0;
  }
  .meta { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

  nav.toptabs {
    flex-basis: 100%; margin: 22px 0 0;
    display: flex; flex-wrap: nowrap; gap: 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav.toptabs::-webkit-scrollbar { display: none; }
  nav.toptabs button {
    appearance: none; background: transparent; border: 0;
    padding: 12px 16px 10px;
    font: inherit; color: var(--ink-soft); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    display: flex; align-items: baseline; gap: 8px;
    white-space: nowrap; flex-shrink: 0;
  }
  nav.toptabs button:hover { color: var(--ink); }
  nav.toptabs button.is-active { color: var(--ink); border-bottom-color: var(--terra); }
  nav.toptabs .tt-num {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 13px; color: var(--terra-dk); font-style: italic;
  }
  nav.toptabs .tt-name { font-size: 15px; font-weight: 500; }
  nav.toptabs .tt-count {
    font-size: 11px; color: var(--ink-mute);
    background: var(--bg-2); padding: 2px 7px; border-radius: 10px;
    font-family: ui-monospace, monospace;
  }
  @media (max-width: 600px) {
    nav.toptabs button { padding: 10px 12px 8px; gap: 6px; }
    nav.toptabs .tt-count { display: none; }
    nav.toptabs .tt-name { font-size: 14px; }
    nav.toptabs .tt-num { font-size: 12px; }
    header.app { padding: 16px 16px 0; }
    h1.title { font-size: 22px; }
    .kicker { font-size: 10px; }
    .meta { display: none; }
    .wc-line1 { font-size: 11px; }
    .weather-corner { display: none; }
    main { padding: 16px 16px 60px; }
    .brand { gap: 10px; }
    .seal { width: 38px; height: 38px; flex-shrink: 0; }
    .diagram-card { padding: 10px; }
    .diagram-frame { padding: 14px 10px 18px; }
    .expert-launch { padding: 24px 0; }
    .expert-launch-card { padding: 24px 20px; border-radius: 0; border-left: 0; border-right: 0; }
    aside.side { position: static; max-height: none; overflow-y: visible; }
    .totals { grid-template-columns: repeat(2, 1fr); }
    .tasks-view { padding: 16px 12px 60px; }
    .task-item { padding: 10px 14px; }
  }

  /* ============================================================
   *   MAIN
   * ============================================================ */
  main {
    max-width: 1240px; margin: 0 auto;
    padding: 24px 24px 80px;
  }
  .view { /* no entrance animation */ }

  /* ============================================================
   *   MAP VIEW: sub-tabs + schematic
   * ============================================================ */
  .subtabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .subtabs button {
    appearance: none; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink-soft);
    padding: 8px 14px; font: inherit; font-size: 13px;
    border-radius: 999px; cursor: pointer;
    transition: all .15s;
  }
  .subtabs button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .subtabs button.is-active {
    background: var(--ink); color: var(--paper);
    border-color: var(--ink);
  }
  .subtabs button .sub-em {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; margin-right: 6px;
    color: inherit; opacity: .7;
  }

  .season-toggle {
    display: flex; gap: 6px; margin: -6px 0 14px;
  }
  .season-toggle button {
    appearance: none; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink-soft);
    padding: 4px 14px; font: inherit; font-size: 12px;
    border-radius: 999px; cursor: pointer;
    transition: all .15s;
  }
  .season-toggle button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .season-toggle button.is-active {
    background: var(--moss); color: var(--paper);
    border-color: var(--moss);
  }

  .map-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
  }
  @media (max-width: 900px) { .map-grid { grid-template-columns: 1fr; } }

  .all-beds-plan { width: 100%; margin-top: 8px; }
  .all-beds-plan svg { width: 100%; height: auto; display: block; }

  .bed-head {
    margin-bottom: 14px;
    display: flex; flex-wrap: wrap; gap: 12px 22px; align-items: baseline;
  }
  .bed-head h2 { font-size: 26px; margin: 0; }
  .bed-head .dims {
    font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--ink-soft); background: var(--bg-2);
    padding: 4px 10px; border-radius: 4px; letter-spacing: .03em;
  }
  .bed-head p.lead {
    flex-basis: 100%; margin: 0; color: var(--ink-soft); max-width: 64ch;
  }

  .totals {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; background: var(--paper);
    margin-bottom: 16px;
  }
  .totals > div {
    padding: 10px 14px; border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 10px;
  }
  .totals > div:last-child { border-right: 0; }
  .totals .k {
    font-size: 10px; text-transform: uppercase; letter-spacing: .18em;
    color: var(--ink-soft); order: 2;
  }
  .totals .v {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px; line-height: 1.1; order: 1;
  }

  .diagram-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .diagram-frame {
    background: var(--paper-2);
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 18px 18px 22px;
    position: relative;
  }
  .diagram-frame::before {
    content: "N";
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 13px; color: var(--terra-dk);
  }
  .compass-line {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    width: 1px; height: 8px; background: var(--terra-dk);
  }
  .diagram-frame::after {
    content: "S"; position: absolute; bottom: 4px; left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
  }
  .ew-tick {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
  }
  .ew-tick.w { left: 4px; }
  .ew-tick.e { right: 4px; }

  /* ============================================================
   *   BED SVG CANVAS — proportional planting diagram
   * ============================================================ */
  .bed-svg-wrap {
    background: var(--paper);
    border-radius: 6px;
    padding: 8px 10px 10px;
    border: 1px solid var(--line-soft);
  }
  .bed-svg-meta {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 6px 14px;
    padding: 0 4px 8px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 12px;
    color: var(--ink-soft);
    border-bottom: 1px dashed var(--line-soft);
    margin-bottom: 8px;
  }
  .bed-svg-meta .bed-compass {
    color: var(--terra-dk);
    letter-spacing: .08em;
  }
  .bed-svg-meta .bed-compass .arrow { font-style: normal; font-weight: 700; }
  .bed-svg-meta .bed-axis-x,
  .bed-svg-meta .bed-axis-y {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: ui-monospace, monospace;
    font-style: normal; font-size: 11px;
    color: var(--ink-mute); letter-spacing: .04em;
  }
  .bed-svg-meta .rule {
    display: inline-block; width: 28px; height: 1px;
    background: var(--line);
  }

  .bed-svg {
    display: block;
    width: 100%;
    height: auto;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--paper) 92%, var(--moss) 4%), var(--paper));
    border-radius: 4px;
    overflow: visible;
  }
  .bed-svg .grid-line {
    stroke: rgba(150, 130, 80, 0.10);
    stroke-width: 0.4;
  }
  .bed-svg .zone-line {
    stroke: var(--terra);
    stroke-width: 0.8;
    stroke-dasharray: 3 2;
    opacity: .6;
  }
  .bed-svg .zone-label {
    fill: var(--ink-mute);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    letter-spacing: .04em;
  }

  .bed-svg .band-path { fill: rgba(185, 107, 62, .09); }
  .bed-svg .band-gap  { fill: rgba(160, 145, 100, .07); }
  .bed-svg .band-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
  }
  .bed-svg .band-path-label { fill: var(--terra-dk); }
  .bed-svg .band-gap-label  { fill: var(--ink-mute); }

  .bed-svg .row-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    fill: var(--ink);
    font-weight: 500;
  }
  .bed-svg .row-dim {
    font-family: ui-monospace, monospace;
    fill: var(--ink-mute);
  }

  .bed-svg .sub-block {
    fill: rgba(196, 68, 56, .035);
    stroke: var(--c-tom);
    stroke-width: 0.5;
    stroke-dasharray: 2 1.5;
  }
  .bed-svg .sub-block.pepper-block {
    fill: rgba(123, 63, 134, .04);
    stroke: var(--c-pep);
  }
  .bed-svg .sub-block-label {
    fill: var(--ink-mute);
    font-family: ui-monospace, monospace;
    font-style: italic;
  }

  .bed-svg .plant-g {
    cursor: pointer;
    transition: filter .15s;
  }
  .bed-svg .plant-g:hover { filter: brightness(.94); }
  .bed-svg .plant-g circle {
    transition: stroke-width .12s;
  }
  .bed-svg .plant-g:hover circle,
  .bed-svg .plant-g.is-active circle {
    stroke-width: 1.8;
  }
  .bed-svg .plant-g.is-active circle {
    filter: drop-shadow(0 0 1.2px rgba(0,0,0,.45));
  }
  .bed-svg .plant-code {
    font-family: ui-sans-serif, system-ui, sans-serif;
    pointer-events: none;
    user-select: none;
  }
  .bed-svg .carrot-band-rect {
    fill: rgba(215, 122, 44, .18);
    stroke: var(--c-root);
    stroke-width: 0.6;
    stroke-dasharray: 2 1.5;
  }
  .bed-svg .carrot-band-g:hover .carrot-band-rect {
    fill: rgba(215, 122, 44, .28);
  }
  .bed-svg .carrot-band-label {
    fill: var(--c-root);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    letter-spacing: .04em;
    pointer-events: none;
  }

  /* schematic rows */
  .schem {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 16px;
  }

  /* ============================================================
   *   JSX-style hand-laid bed diagrams (left / right / unfenced / bags)
   * ============================================================ */
  .jsx-bed-wrap {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 4px;
  }
  .jsx-note {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-mute);
    margin: 0 0 2px;
    letter-spacing: .01em;
  }
  .jsx-bed-svg-wrap {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 6px 8px;
  }
  .jsx-bed-svg {
    display: block;
    width: 100%;
    height: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }
  .jsx-bed-svg text { user-select: none; }
  .jsx-plant { cursor: pointer; transition: filter .12s; }
  .jsx-plant:hover { filter: brightness(.92) saturate(1.05); }
  .jsx-plant:hover circle,
  .jsx-plant:hover rect,
  .jsx-plant:hover ellipse,
  .jsx-plant.is-active circle,
  .jsx-plant.is-active rect,
  .jsx-plant.is-active ellipse {
    stroke-width: 2;
  }
  .jsx-plant.is-active { filter: drop-shadow(0 0 1.5px rgba(0,0,0,.4)); }

  .jsx-bed-legend {
    display: flex; flex-wrap: wrap; gap: 4px 14px;
    padding: 6px 10px;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .jsx-leg-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .jsx-leg-sw {
    width: 9px; height: 9px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .jsx-leg-sw.sq { border-radius: 2px; }

  .schem-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px; align-items: stretch;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 12px 14px;
    transition: border-color .15s;
  }
  .schem-row:hover { border-color: var(--line); }
  .schem-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    color: var(--ink-mute);
    padding: 8px 14px;
  }
  .schem-row.empty.path {
    background: repeating-linear-gradient(45deg,
      rgba(185,107,62,.04) 0 8px, transparent 8px 16px);
    border: 1px dashed var(--terra);
    color: var(--terra-dk);
  }
  .schem-row.empty.path .row-info p {
    color: var(--terra-dk);
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 12.5px;
    letter-spacing: .04em;
  }
  .schem-row.empty .row-info p { color: var(--ink-mute); font-style: italic; }
  .row-head {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .row-letter {
    flex: none;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--paper-2); border: 1px solid var(--line);
    display: grid; place-items: center;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600; font-size: 15px; color: var(--terra-dk);
  }
  .row-info { min-width: 0; }
  .row-info h4 {
    margin: 0; font-size: 13.5px; font-weight: 600; line-height: 1.25;
  }
  .row-info p {
    margin: 2px 0 0;
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--ink-mute); letter-spacing: .02em;
  }
  .row-body {
    display: flex; flex-direction: column; gap: 8px;
    justify-content: center;
    min-width: 0;
    overflow-x: auto;
  }
  .track {
    display: flex; flex-wrap: nowrap; align-items: center;
    gap: 8px 22px;
  }
  .track-label {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 11px; color: var(--ink-mute);
    width: 64px; flex: none;
  }
  .cluster {
    display: flex; flex-wrap: nowrap; gap: 5px; align-items: center;
    background: transparent;
    border: none;
    padding: 0;
  }
  .cluster.tight { padding: 0; }
  .cluster-sep { display: none; }

  /* alongside / divider marker — used for pepper block separation */
  .cluster-spacer {
    flex: none;
    display: inline-flex; align-items: center;
    padding: 0 8px;
    margin: 0 2px;
    height: 32px;
    border-left: 1px dashed var(--line);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10.5px;
    color: var(--ink-mute);
    letter-spacing: .08em;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* plant disc */
  .plant {
    position: relative; flex: none;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    transition: transform .12s ease;
    --fam-color: var(--c-tom);
  }
  .plant:hover { transform: translateY(-2px); }
  .plant .disc {
    width: 38px; height: 38px; border-radius: 50%;
    background: color-mix(in srgb, var(--fam-color) 14%, var(--paper));
    color: var(--fam-color);
    display: grid; place-items: center;
    font-weight: 700; font-size: 11.5px; letter-spacing: .02em;
    box-shadow: var(--shadow-sm);
    border: 1.8px solid var(--fam-color);
    transition: box-shadow .15s, transform .12s;
  }
  .plant:hover .disc,
  .plant.is-active .disc {
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink);
  }
  .plant .disc.lg { width: 52px; height: 52px; font-size: 13px; }
  .plant .disc.sm { width: 30px; height: 30px; font-size: 10px; border-width: 1.5px; }
  .plant .cap {
    font-size: 10px; color: var(--ink-soft);
    margin-top: 3px; max-width: 70px; text-align: center;
    line-height: 1.15;
  }
  .plant .cap.hidden { display: none; }

  /* nasturtium — outlined green N */
  .nast {
    --fam-color: var(--moss-dk);
  }
  .nast .disc {
    width: 26px; height: 26px;
    background: color-mix(in srgb, #f0d56a 35%, var(--paper));
    color: var(--moss-dk);
    border: 1.5px solid var(--moss-dk);
    font-size: 11px;
  }

  /* carrot band */
  .carrot-band {
    flex: 1 1 100%;
    background:
      repeating-linear-gradient(135deg,
        rgba(215,122,44,.18) 0 6px, rgba(215,122,44,.05) 6px 12px);
    border: 1.5px dashed var(--c-root);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    color: var(--c-root);
    font-weight: 600; font-size: 12px;
    letter-spacing: .12em;
    cursor: pointer;
  }
  .carrot-band:hover { background-color: rgba(215,122,44,.10); }
  .carrot-band small {
    display: block; color: var(--ink-mute); font-size: 10px;
    font-weight: 400; letter-spacing: .04em; margin-top: 2px;
    text-transform: none;
  }

  /* Right bed: triple-column layout — veg | blueberry | squash strip */
  .right-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 108px 92px;
    gap: 12px;
    align-items: stretch;
  }
  @media (max-width: 760px) {
    .right-layout { grid-template-columns: 1fr; }
  }
  .right-layout > .rows-col { min-width: 0; }
  .strip-col {
    border: 1px dashed var(--c-squash);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(106,148,56,.06), rgba(106,148,56,.12));
    padding: 12px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    position: relative;
  }
  .strip-col h4 {
    margin: 0;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 15px; color: var(--moss-dk);
    text-align: center;
  }
  .strip-col .strip-meta {
    font-family: ui-monospace, monospace;
    font-size: 10px; color: var(--ink-mute);
    text-align: center; line-height: 1.4;
  }
  .strip-col .mound-row {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    position: relative;
  }
  .strip-col .mound-row .vine-arrow {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    color: var(--c-squash); font-size: 13px;
  }
  .strip-col .mound-row .vine-arrow::after { content: "→"; }
  .strip-col .strip-gap {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10px;
    color: var(--ink-mute);
  }
  .strip-col .strip-fence {
    margin-top: auto; padding-top: 8px;
    width: 100%; text-align: center;
    border-top: 2px solid var(--terra-dk);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 10.5px; color: var(--terra-dk);
  }
  .strip-col .strip-fence::before {
    content: "▲▲▲▲▲▲▲";
    display: block; color: var(--terra-dk);
    letter-spacing: 2px; font-size: 8px; line-height: 1;
    margin-bottom: 3px;
  }
  @media (max-width: 700px) {
    .right-layout { grid-template-columns: 1fr; }
  }
  .berry-col {
    border: 1px dashed var(--c-berry);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(74,93,154,.05), rgba(74,93,154,.10));
    padding: 12px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px;
    position: relative;
  }
  .berry-col h4 {
    margin: 0 0 4px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 16px; color: var(--c-berry);
    text-align: center;
  }
  .berry-col .berry-meta {
    font-family: ui-monospace, monospace;
    font-size: 10px; color: var(--ink-mute);
    text-align: center; line-height: 1.4;
  }
  .berry-col .fence-note {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px dashed var(--terra-dk);
    width: 100%;
    text-align: center;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic; font-size: 10.5px; color: var(--terra-dk);
    line-height: 1.3;
  }

  /* Strip bed: vertical column of mounds */
  .strip-layout {
    max-width: 280px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  .strip-row {
    border: 1px solid var(--line-soft); border-radius: 8px;
    background: var(--paper);
    padding: 12px 14px;
    display: grid; grid-template-columns: 80px 1fr;
    gap: 12px; align-items: center;
    position: relative;
  }
  .strip-row .info {
    font-size: 11px; color: var(--ink-soft);
    line-height: 1.25;
  }
  .strip-row .info strong { display: block; color: var(--ink); font-size: 12px; font-weight: 600; }
  .strip-row .info em { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; color: var(--ink-mute); }
  .strip-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    color: var(--ink-mute);
    text-align: center;
    grid-template-columns: 1fr;
    font-size: 11px; padding: 8px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  }
  .strip-row .vine-east {
    position: absolute; right: -34px; top: 50%; transform: translateY(-50%);
    width: 30px; color: var(--c-squash); font-size: 14px;
    display: flex; align-items: center; gap: 2px;
  }
  .strip-row .vine-east::after {
    content: "→"; font-size: 16px;
  }

  /* Middle bed: 4 cane rows running N-S → render as vertical columns */
  .middle-layout {
    display: flex; flex-direction: column; gap: 10px;
  }
  .middle-head {
    text-align: center; font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-size: 12px; color: var(--ink-mute);
    letter-spacing: .12em; text-transform: uppercase;
  }
  .middle-cols {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    align-items: stretch;
  }
  @media (max-width: 800px) {
    .middle-cols { grid-template-columns: repeat(3, 1fr); }
    .season-toggle { display: none; }
  }
  @media (max-width: 520px) {
    .middle-cols { grid-template-columns: 1fr 1fr; }
  }
  .cane-col {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 10px 6px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .cane-col-label {
    font-size: 12px;
    text-align: center;
    line-height: 1.3;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line-soft);
    width: 100%;
  }
  .cane-col-label .cane-letter {
    display: inline-grid; place-items: center; vertical-align: middle;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--paper-2); border: 1px solid var(--line);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 600; font-size: 12px;
    color: var(--terra-dk); margin-right: 6px;
  }
  .cane-col-label .cane-spacing {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: var(--ink-mute);
  }
  .cane-plants {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding-top: 4px;
  }

  /* Grow bags */
  .bags-layout {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .bag-card {
    --fam-color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 4px solid var(--fam-color);
    border-radius: 8px;
    padding: 12px 14px 12px 12px;
    display: grid; grid-template-columns: 62px 1fr;
    gap: 10px;
    cursor: pointer;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    box-shadow: var(--shadow-sm);
  }
  .bag-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px -8px rgba(80,55,15,.4); }
  .bag-shape { display: grid; place-items: center; }
  .bag-shape svg { width: 62px; height: auto; }
  .bag-body { min-width: 0; }
  .bag-id {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: var(--ink-mute); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .bag-plant {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px; line-height: 1.1; margin-top: 2px;
    color: var(--ink);
  }
  .bag-meta {
    font-family: ui-monospace, monospace; font-size: 10.5px;
    color: var(--ink-soft); margin-top: 3px;
  }
  .bag-note {
    font-size: 11px; line-height: 1.45;
    color: var(--ink-soft); margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line-soft);
  }

  /* Unfenced bed: 2 squash rows — visually tall & narrow (264″ NS × 126″ EW) */
  .unfenced-layout {
    display: flex; flex-direction: column; gap: 0;
    max-width: 380px; margin: 0 auto;
    position: relative;
  }
  .unfenced-layout .ns-ruler {
    position: absolute; top: 0; left: -18px; bottom: 0; width: 12px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between;
    color: var(--ink-mute); font-size: 9px; letter-spacing: .15em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  }
  .unfenced-layout .ns-ruler::before {
    content: ""; position: absolute; left: 50%; top: 6px; bottom: 6px;
    border-left: 1px dashed var(--line);
  }
  .squash-row {
    display: grid; grid-template-columns: 130px 1fr;
    gap: 12px; align-items: center;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 4px 0;
  }
  .squash-row.empty {
    background: transparent;
    border: 1px dashed var(--line-soft);
    grid-template-columns: 1fr;
    text-align: center; color: var(--ink-mute);
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
    font-size: 12px; padding: 6px 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .squash-row.empty.path {
    background: repeating-linear-gradient(45deg,
      rgba(185,107,62,.04) 0 8px, transparent 8px 16px);
    border: 1px dashed var(--terra);
    color: var(--terra-dk);
  }
  .squash-row .mounds {
    display: flex; gap: 30px; flex-wrap: wrap;
  }
  .vine-south-note {
    text-align: center; font-style: italic;
    color: var(--c-squash);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px; padding: 6px 0;
  }
  .vine-south-note::before { content: "↓ "; }
  .vine-south-note::after  { content: " ↓"; }

  /* ============================================================
   *   SIDE PANEL
   * ============================================================ */
  aside.side { display: flex; flex-direction: column; gap: 14px; min-width: 0; position: sticky; top: 16px; align-self: flex-start; max-height: calc(100vh - 80px); overflow-y: auto; }
  .panel {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .panel h3 {
    margin: 0 0 10px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .2em;
    color: var(--terra-dk);
  }
  .panel h3::after {
    content: ""; display: block; width: 22px; height: 1px;
    background: var(--terra); margin-top: 4px;
  }

  .details .name {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 24px; line-height: 1.1; margin: 0 0 2px;
  }
  .details .fam {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; text-transform: uppercase; letter-spacing: .14em;
    color: var(--ink-soft); margin-bottom: 12px;
  }
  .details .fam .dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,.25);
  }
  .details dl {
    margin: 0; display: grid; grid-template-columns: 96px 1fr;
    gap: 5px 12px; font-size: 13px;
  }
  .details dt {
    color: var(--ink-soft); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .12em;
    align-self: center;
  }
  .details dd { margin: 0; font-variant-numeric: tabular-nums; }
  .details .notes {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-size: 13px; line-height: 1.5;
  }
  .details .notes strong {
    display: block; font-size: 10px; text-transform: uppercase;
    letter-spacing: .18em; color: var(--terra-dk); margin-bottom: 4px;
  }
  .details .empty {
    color: var(--ink-soft); font-size: 13px; font-style: italic;
  }

  .legend-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px;
    font-size: 12px;
  }
  .legend-grid .sw { display: flex; align-items: center; gap: 8px; }
  .legend-grid .sw .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,.25);
  }
  .legend-grid .sw .nast-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #f0d56a; border: 1px solid var(--moss-dk);
    display: grid; place-items: center;
    font-size: 7px; color: var(--moss-dk); font-weight: 700;
  }

  /* ============================================================
   *   PLANTS VIEW
   * ============================================================ */
  .plants-toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 14px;
  }
  .plants-toolbar .chips {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .chip {
    appearance: none; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink-soft);
    padding: 5px 11px; font: inherit; font-size: 12px;
    border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-soft); }
  .chip.is-active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .chip .chip-dot {
    width: 9px; height: 9px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.4);
  }
  .chip:not(.is-active) .chip-dot {
    border-color: rgba(0,0,0,.2);
  }
  .plants-search {
    flex: 1 1 200px;
    appearance: none;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 14px; font: inherit; font-size: 13px;
    background: var(--paper); color: var(--ink);
    min-width: 0;
  }
  .plants-search:focus { outline: none; border-color: var(--ink-soft); }

  .plants-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .plant-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .plant-card::before {
    content: ""; position: absolute;
    top: 0; left: 0; bottom: 0; width: 4px;
    background: var(--card-color, var(--ink));
  }
  .plant-card .pc-head {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px;
  }
  .plant-card .pc-disc {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--card-color); color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
    border: 1.5px solid rgba(0,0,0,.18);
    flex: none;
  }
  .plant-card.nast-card .pc-disc {
    background: #f0d56a; color: var(--moss-dk);
    border: 1.5px solid var(--moss-dk);
  }
  .plant-card h4.pc-name {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 20px; line-height: 1.1; margin: 0;
  }
  .plant-card .pc-var {
    font-size: 11px; color: var(--ink-mute);
    font-style: italic;
    font-family: "Cormorant Garamond", Georgia, serif;
  }
  .plant-card .pc-fam {
    font-size: 10px; text-transform: uppercase; letter-spacing: .15em;
    color: var(--ink-soft);
  }
  .plant-card .pc-row {
    display: grid; grid-template-columns: 64px 1fr; gap: 4px 10px;
    font-size: 12px; padding: 4px 0;
    border-top: 1px dashed var(--line-soft);
  }
  .plant-card .pc-row .k {
    color: var(--ink-mute); font-size: 10px;
    text-transform: uppercase; letter-spacing: .1em;
    padding-top: 2px;
  }
  .plant-card .pc-row .v { color: var(--ink); }
  .water-dots { font-size: 10px; color: #2e7fb8; letter-spacing: 1px; margin-left: 5px; vertical-align: middle; }
  .plant-card .pc-notes {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--line-soft);
    font-size: 12px; color: var(--ink-soft); line-height: 1.5;
  }
  .plant-card .pc-qty {
    margin-left: auto;
    display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px; line-height: 1; color: var(--terra-dk);
  }
  .plant-card .pc-qty small {
    font-family: ui-sans-serif, sans-serif;
    font-size: 10px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: .1em;
    display: block; line-height: 1; order: 2;
  }
  .plant-card .pc-companions {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--line-soft);
  }
  .plant-card .pc-comp-label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-mute); margin-bottom: 4px;
  }
  .plant-card .pc-comp-list { display: flex; flex-direction: column; gap: 3px; }
  .plant-card .pc-comp-item { font-size: 12px; color: var(--ink-soft); line-height: 1.4; }
  .plant-card .pc-comp-item strong { color: var(--moss-dk); font-weight: 600; }

  /* ============================================================
   *   CALENDAR VIEW
   * ============================================================ */
  .cal-header {
    display: flex; flex-wrap: wrap; justify-content: space-between;
    align-items: flex-end; gap: 16px;
    margin-bottom: 16px;
  }
  .cal-header .location {
    display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap;
  }
  .cal-header h2 {
    font-size: 24px; margin: 0;
  }
  .cal-header .zone {
    font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--terra-dk);
    background: var(--bg-2); padding: 4px 10px; border-radius: 4px;
  }
  .frost-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft);
  }
  .frost-line .frost-tick {
    width: 1px; height: 14px; background: var(--terra-dk);
    margin-right: 2px;
  }

  .cal-legend {
    display: flex; flex-wrap: wrap; gap: 12px 18px;
    font-size: 11.5px; margin-bottom: 16px;
  }
  .cal-legend .item { display: flex; align-items: center; gap: 6px; }
  .cal-legend .sw {
    width: 22px; height: 10px; border-radius: 3px;
    border: 1px solid rgba(0,0,0,.18);
  }

  .cal-table {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cal-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
  .cal-table { min-width: 660px; }
  .cal-months {
    display: grid;
    grid-template-columns: 200px repeat(12, 1fr);
    background: var(--paper-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    color: var(--ink-soft); text-transform: uppercase;
    letter-spacing: .1em;
  }
  .cal-months > div {
    padding: 8px 10px; text-align: center;
    border-right: 1px solid var(--line-soft);
  }
  .cal-months > div:first-child { text-align: left; position: sticky; left: 0; z-index: 2; background: var(--paper-2); }
  .cal-months > div:last-child { border-right: 0; }

  .cal-rows-wrap {
    position: relative;
  }
  /* frost overlay lines spanning all rows */
  .cal-frost {
    position: absolute; top: 0; bottom: 0; width: 0;
    border-left: 1.5px dashed var(--terra-dk);
    pointer-events: none; z-index: 3;
  }
  .cal-frost .lbl {
    position: absolute; top: 4px; left: 4px;
    font-size: 9.5px; color: var(--terra-dk);
    background: var(--paper); padding: 1px 5px;
    border-radius: 3px; white-space: nowrap;
    font-family: ui-monospace, monospace;

<script>
/* ============================================================
 *   FAMILY DEFINITIONS
 * ============================================================ */
const FAM = {
  tomato:   { color: 'var(--c-tom)',    label: 'Tomatoes' },
  pepper:   { color: 'var(--c-pep)',    label: 'Peppers' },
  cucumber: { color: 'var(--c-cuke)',   label: 'Cucumbers' },
  brassica: { color: 'var(--c-bras)',   label: 'Brassicas' },
  root:     { color: 'var(--c-root)',   label: 'Roots' },
  allium:   { color: 'var(--c-alli)',   label: 'Alliums' },
  squash:   { color: 'var(--c-squash)', label: 'Squash' },
  herb:     { color: 'var(--c-herb)',   label: 'Herbs' },
  flower:   { color: 'var(--c-flw)',    label: 'Flowers' },
  berry:    { color: 'var(--c-berry)',  label: 'Berries' },
  cane:     { color: 'var(--c-cane)',   label: 'Brambles' },
  legume:   { color: 'var(--c-legume)', label: 'Legumes' },
  perennial:{ color: 'var(--c-peren)',  label: 'Perennials' },
  cover:    { color: 'var(--c-cover)',  label: 'Cover crops' },
};

/* PLANT_INFO — defined in plants.js */


/* ============================================================
 *   BED LAYOUT DATA
 *   Each bed has rows, each row has tracks (sub-rows) of clusters.
 * ============================================================ */

/* helper: make plant instance referencing PLANT_INFO */
let _pid = 0;
function p(name, opts) {
  return { id: 'p' + (++_pid), name, ...(opts || {}) };
}

/* ============================================================
 *   LAYOUT HELPERS — produce plant placements with (x,y) in inches.
 *   Inches are absolute within the bed: x = E-W from west edge,
 *   y = N-S from north edge. Rendered via SVG viewBox so spacing
 *   is true-to-scale across the whole diagram.
 * ============================================================ */

function line(y, items, opts) {
  opts = opts || {};
  const defaultSp = opts.sp != null ? opts.sp : 18;
  let x = 0;
  const out = items.map((it, i) => {
    if (i > 0) x += (it.after != null ? it.after : defaultSp);
    return Object.assign(p(it.n, it.opts), { x: x, y: y });
  });
  if (opts.centerX != null && out.length > 1) {
    const span = out[out.length-1].x - out[0].x;
    const shift = opts.centerX - span/2 - out[0].x;
    out.forEach(o => o.x += shift);
  } else if (opts.startX != null && out.length) {
    const shift = opts.startX - out[0].x;
    out.forEach(o => o.x += shift);
  }
  return out;
}
function plantAt(name, x, y, opts) {
  return Object.assign(p(name, opts), { x: x, y: y });
}

const BEDS = {};

/* ====================================================================
 *  LEFT BED  ·  400" E-W × 350" N-S
 *  Rows N→S: SF / tomato 1 (BW+SM+TL) / tomato 2 (SG+JU) /
 *  pepper block + HB JL TB + ZU SS mounds (full 400″ EW) /
 *  herb border (DL EC) / cucumber trellis.
 * ==================================================================== */
{
  const plants = [];
  const N = (name, count, zone) => { for (let i = 0; i < count; i++) plants.push(plantAt(name, 0, 0, zone ? { zone } : null)); };
  N('Sunflower', 12, 'left bed · north edge');
  N('Brandywine', 4, 'tomato row 1 · BW 2×2 sub-block');
  N('San Marzano', 3, 'tomato row 1');
  N('Tomatillo', 2, 'tomato row 1 · east');
  N('Sungold', 5, 'tomato row 2');
  N('Juliette', 2, 'tomato row 2 · east');
  N('Nasturtium', 12, 'left bed · interplanted across rows');
  N('Bell pepper', 3, 'pepper block · row 1');
  N('Shishito pepper', 2, 'pepper block · row 2');
  N('Basil', 3, 'pepper block · gap-fill');
  N('Habanero', 1, 'east of pepper block');
  N('Jalapeño', 1, 'east of habanero');
  N('Thai basil', 2, 'east of HB/JL');
  N('Zucchini (bush)', 2, 'pepper zone EW — mounds');
  N('Summer squash (bush)', 2, 'pepper zone EW — mounds');
  N('Dill', 1, 'herb border · east strip');
  N('Echinacea', 1, 'herb border · perennial');
  N('Citronella', 2, 'herb strip · east end · tender perennial');
  N('Cucumber', 12, 'trellised · 18″ apart');
  N('French Tarragon', 1, 'east herb strip · TR');

  BEDS.left = {
    title: 'Left Bed',
    dims: '400″ E-W × 350″ N-S · 318″ used · 32″ spare',
    lead: 'Five rows (A–E) running E-W on a 400″ bed: sunflowers at the north edge, tomatoes across row B with a half-height SG + pepper sub-row below, squash mounds and an east herb strip in row D, and cucumbers trellised along the south fence in row E. Five harvest paths — including a 48″ gap between the tomato and squash rows — keep every row reachable from both sides.',
    totals: [
      { k: 'Plants',  v: '73' },
      { k: 'Families', v: '7' },
      { k: 'N-S Used', v: '318″ / 350″' },
      { k: 'Paths',   v: '5 harvest paths' },
    ],
    ewIn: 400, nsIn: 350,
    jsx: 'left',

/* ============================================================
 *   STATE
 * ============================================================ */
const VALID_VIEWS = ['map','photos','plants','calendar','tasks','expert'];
const VALID_BEDS  = ['all','left','middle','right','unfenced','bags'];
let activeView = VALID_VIEWS.includes(location.hash.slice(1)) ? location.hash.slice(1)
               : (localStorage.getItem('activeView') || 'map');
let activeBed  = VALID_BEDS.includes(localStorage.getItem('activeBed'))
               ? localStorage.getItem('activeBed') : 'left';
let activePlantId = null;
let gardenSeason = 'summer';
let activeFamilyFilter = 'all';
let plantSearchQ = '';

/* ============================================================
 *   UTILITIES
 * ============================================================ */
const $ = (s, root) => (root || document).querySelector(s);

function waterLevel(s) {
  if (!s) return 2;
  const t = s.toLowerCase();
  if (/drought|low|dry between|minimal/.test(t)) return 1;
  if (/1[–\-]1\.5|1[–\-]2|1\.5|deep.even|even moist|consistent|daily/.test(t)) return 3;
  return 2;
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.setAttribute('style', attrs[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children])
    .forEach(c => c != null && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

/* index all plants in all beds for detail lookup */
const PLANT_INDEX = {};
function indexPlants() {
  for (const bedKey in BEDS) {
    const bed = BEDS[bedKey];
    if (bed.plants) {
      bed.plants.forEach((pl, i) => {
        pl._bed = bedKey; pl._idx = i;
        PLANT_INDEX[pl.id] = pl;
      });
    }
    if (bed.bags) {
      bed.bags.forEach((bag, bi) => {
        bag.plant._bed = bedKey; bag.plant._bag = bag.id; bag.plant._idx = bi;
        PLANT_INDEX[bag.plant.id] = bag.plant;
      });
    }
  }
}
indexPlants();

/* unique plant name → list of placements */
const PLANT_PLACEMENTS = {};
Object.values(PLANT_INDEX).forEach(pl => {
  (PLANT_PLACEMENTS[pl.name] = PLANT_PLACEMENTS[pl.name] || []).push(pl);
});

function plantQty(name) { return (PLANT_PLACEMENTS[name] || []).length; }
function plantBeds(name) {
  const beds = {};
  (PLANT_PLACEMENTS[name] || []).forEach(pl => {
    beds[pl._bed] = (beds[pl._bed] || 0) + 1;
  });
  return beds;
}
function bedTitle(k) { return BEDS[k] ? BEDS[k].title : k; }

/* ============================================================
 *   RENDER: TOP-LEVEL
 * ============================================================ */
function renderTopTabs() {
  document.querySelectorAll('#toptabs button').forEach(b => {
    b.classList.toggle('is-active', b.dataset.view === activeView);
    b.onclick = () => {
      activeView = b.dataset.view;
      activePlantId = null;
      location.hash = activeView;
      localStorage.setItem('activeView', activeView);
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  });
  /* scroll active tab into view on narrow screens */
  const activeBtn = document.querySelector('#toptabs button.is-active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', inline: 'center' });
  $('#plantCount').textContent = Object.keys(PLANT_INFO).length + ' kinds';
}

function renderAll() {
  renderTopTabs();
  const main = $('#app');
  main.innerHTML = '';
  const view = el('div', { class: 'view' });
  main.appendChild(view);
  if (activeView === 'map') renderMap(view);
  else if (activeView === 'plants') renderPlants(view);
  else if (activeView === 'calendar') renderCalendar(view);
  else if (activeView === 'expert') renderExpert(view);
  else if (activeView === 'tasks') renderTasks(view);
  else if (activeView === 'photos') renderPhotos(view);
}

 *   RENDER: MAP VIEW

/* ============================================================
 *   RENDER: BED SVG (proportional planting diagram)
 *   - viewBox in inches → spacing renders true-to-scale.
 *   - Each plant is an SVG <g> with circle + code; click/hover
 *     wires to the detail panel via setActivePlant().
 * ============================================================ */
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* family → plant disc radius (in inches) and font size */
function plantRadius(name, info) {
  if (name === 'Nasturtium') return 3.5;
  if (!info) return 5;
  switch (info.fam) {
    case 'flower':   return name === 'Sunflower' ? 6.5 : 4.5;
    case 'tomato':   return 6.5;
    case 'pepper':   return 5.5;
    case 'squash':   return 7;
    case 'cucumber': return 5.5;
    case 'brassica': return 5;
    case 'root':     return 3;
    case 'allium':   return 3;
    case 'herb':     return 4;
    case 'berry':    return 5.5;
    case 'cane':     return 4.5;
    case 'legume':   return 4.5;
    default:         return 5;
  }
}

function plantCircleColors(name, info) {
  if (name === 'Nasturtium') {
    return { fill: '#f5dc7a', stroke: '#364a23', text: '#364a23' };
  }
  const famVar = info && {
    tomato:'tom', pepper:'pep', cucumber:'cuke', brassica:'bras',
    root:'root', allium:'alli', squash:'squash', herb:'herb',
    flower:'flw', berry:'berry', cane:'cane', legume:'legume',
    perennial:'peren', cover:'cover',
  }[info.fam] || 'tom';
  const c = 'var(--c-' + famVar + ')';
  return {
    fill: 'color-mix(in srgb, ' + c + ' 16%, #fbf6ea)',
    stroke: c,
    text: c,
  };
}

function renderBedSVG(schem, bed) {
  const wrap = el('div', { class: 'bed-svg-wrap' });
  /* compass + dims strip */
  const meta = el('div', { class: 'bed-svg-meta' });
  meta.innerHTML =
    '<span class="bed-compass">N <span class="arrow">↑</span></span>' +
    '<span class="bed-axis-x">W <span class="rule"></span> ' + bed.ewIn + '″ E-W <span class="rule"></span> E</span>' +
    '<span class="bed-axis-y">' + bed.nsIn + '″ N-S</span>';
  wrap.appendChild(meta);

  const svg = svgEl('svg', {
    class: 'bed-svg',
    viewBox: '0 0 ' + bed.ewIn + ' ' + bed.nsIn,
    preserveAspectRatio: 'xMidYMid meet',
    style: 'aspect-ratio: ' + bed.ewIn + ' / ' + bed.nsIn + ';',
  });

  /* grid background (every ~50″) */
  const gridStep = 50;
  for (let x = 0; x <= bed.ewIn; x += gridStep) {
    svg.appendChild(svgEl('line', {
      x1: x, y1: 0, x2: x, y2: bed.nsIn, class: 'grid-line',
    }));
  }
  for (let y = 0; y <= bed.nsIn; y += gridStep) {
    svg.appendChild(svgEl('line', {
      x1: 0, y1: y, x2: bed.ewIn, y2: y, class: 'grid-line',
    }));
  }

  /* zone bands (right bed splits into veg / hedge / strip) */
  (bed.zones || []).forEach((z, zi) => {
    if (zi > 0) {
      svg.appendChild(svgEl('line', {
        x1: z.x0, y1: 0, x2: z.x0, y2: bed.nsIn, class: 'zone-line',
      }));
    }
    if (z.label) {
      const t = svgEl('text', {
        x: (z.x0 + z.x1) / 2, y: bed.nsIn - 3,
        'text-anchor': 'middle', class: 'zone-label',
        'font-size': 5,
      });
      t.textContent = z.label;
      svg.appendChild(t);
    }
  });

  /* path / gap bands */
  (bed.bands || []).forEach(b => {
    const x0 = b.xRange ? b.xRange[0] : 0;
    const x1 = b.xRange ? b.xRange[1] : bed.ewIn;
    svg.appendChild(svgEl('rect', {
      x: x0, y: b.y0, width: x1 - x0, height: b.y1 - b.y0,
      class: 'band band-' + b.kind,
    }));
    if (b.label) {
      const t = svgEl('text', {
        x: (x0 + x1) / 2, y: (b.y0 + b.y1) / 2,
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        class: 'band-label band-' + b.kind + '-label',
        'font-size': 5.2,
      });
      t.textContent = b.label;
      svg.appendChild(t);
    }
  });

  /* row labels (above each row's y) */
  (bed.rows || []).forEach(r => {
    if (r.col != null) return; /* cane / column-row label handled separately */
    const t = svgEl('text', {
      x: 5, y: r.y - 7,
      class: 'row-label', 'font-size': 5.5,
    });
    t.textContent = (r.letter ? r.letter + ' · ' : '') + r.label;
    svg.appendChild(t);
    if (r.dim) {
      const t2 = svgEl('text', {
        x: 5, y: r.y - 1.5,
        class: 'row-dim', 'font-size': 4,
      });
      t2.textContent = r.dim;
      svg.appendChild(t2);
    }
  });

  /* cane / column labels for middle bed (vertical at top of column) */
  (bed.rows || []).forEach(r => {
    if (r.col == null) return;
    const tx = r.col;
    const t = svgEl('text', {
      x: tx, y: 14,
      'text-anchor': 'middle',
      class: 'row-label', 'font-size': 5.5,
    });
    t.textContent = r.letter + ' · ' + r.label;
    svg.appendChild(t);
    if (r.dim) {
      const t2 = svgEl('text', {
        x: tx, y: 20,
        'text-anchor': 'middle',
        class: 'row-dim', 'font-size': 4,
      });
      t2.textContent = r.dim;
      svg.appendChild(t2);
    }
  });

  /* visual sub-block hint for the BW 2×2 in the left bed */
  if (bed === BEDS.left) {
    const bw = bed.plants.filter(p => p.name === 'Brandywine');
    if (bw.length >= 4) {
      const xs = bw.map(p => p.x), ys = bw.map(p => p.y);
      const x0 = Math.min(...xs) - 10, x1 = Math.max(...xs) + 10;
      const y0 = Math.min(...ys) - 10, y1 = Math.max(...ys) + 10;
      svg.appendChild(svgEl('rect', {
        x: x0, y: y0, width: x1 - x0, height: y1 - y0,
        class: 'sub-block',
      }));
      const t = svgEl('text', {
        x: x0 + 2, y: y1 - 2,
        class: 'sub-block-label', 'font-size': 3.5,
      });
      t.textContent = 'BW 2×2 · 30″ × 48″';
      svg.appendChild(t);
    }
    /* pepper block outline */
    const pep = bed.plants.filter(p =>
      ['Bell pepper','Shishito pepper','Basil'].includes(p.name) &&
      p.y >= 175 && p.y <= 210
    );
    if (pep.length) {
      const xs = pep.map(p => p.x), ys = pep.map(p => p.y);
      const x0 = Math.min(...xs) - 9, x1 = Math.max(...xs) + 9;
      const y0 = Math.min(...ys) - 9, y1 = Math.max(...ys) + 9;
      svg.appendChild(svgEl('rect', {
        x: x0, y: y0, width: x1 - x0, height: y1 - y0,
        class: 'sub-block pepper-block',
      }));
      const t = svgEl('text', {
        x: x0 + 2, y: y0 + 5,
        class: 'sub-block-label', 'font-size': 3.5,
      });
      t.textContent = '2×3 block';
      svg.appendChild(t);
    }
  }

  /* plants */
  (bed.plants || []).forEach(pl => {
    if (pl.isBand) { svg.appendChild(makeCarrotBand(pl)); return; }
    svg.appendChild(makePlantNode(pl));
  });

  wrap.appendChild(svg);
  schem.appendChild(wrap);
}

function makePlantNode(pl) {
  const info = PLANT_INFO[pl.name];
  const r = plantRadius(pl.name, info);
  const colors = plantCircleColors(pl.name, info);
  const g = svgEl('g', {
    class: 'plant-g' + (pl.id === activePlantId ? ' is-active' : ''),
    transform: 'translate(' + pl.x + ',' + pl.y + ')',
    'data-id': pl.id,
  });
  g.appendChild(svgEl('circle', {
    r: r, fill: colors.fill, stroke: colors.stroke,
    'stroke-width': 0.9,
  }));
  const t = svgEl('text', {
    'text-anchor': 'middle', 'dominant-baseline': 'central',
    fill: colors.text, 'font-size': r * 0.7, 'font-weight': 700,
    class: 'plant-code',
  });
  t.textContent = info ? info.code : '?';
  g.appendChild(t);
  g.addEventListener('mouseenter', () => setActivePlant(pl.id));
  g.addEventListener('click', () => setActivePlant(pl.id, true));
  return g;
}

function makeCarrotBand(pl) {
  const w = pl.bandW || 200, h = pl.bandH || 10;
  const g = svgEl('g', {
    class: 'plant-g carrot-band-g' + (pl.id === activePlantId ? ' is-active' : ''),
    'data-id': pl.id,
  });
  g.appendChild(svgEl('rect', {
    x: pl.x - w/2, y: pl.y - h/2, width: w, height: h,
    class: 'carrot-band-rect', rx: 1.5, ry: 1.5,
  }));
  const t = svgEl('text', {
    x: pl.x, y: pl.y + 0.5,
    'text-anchor': 'middle', 'dominant-baseline': 'central',
    class: 'carrot-band-label', 'font-size': 4.5,
  });
  t.textContent = 'CARROTS · direct sow · thin to 3″';
  g.appendChild(t);
  g.addEventListener('mouseenter', () => setActivePlant(pl.id));
  g.addEventListener('click', () => setActivePlant(pl.id, true));
  return g;
}

function setActivePlant(id, force) {
  activePlantId = id;
  document.querySelectorAll('.plant').forEach(p => {
    p.classList.toggle('is-active', p.dataset.id === id);
  });
  renderDetails();
}

function renderDetailsPanel() {
  const panel = el('section', { class: 'panel details' });
  panel.appendChild(el('h3', null, 'Plant Detail'));
  panel.appendChild(el('div', { id: 'details' }));
  /* auto-select first plant in bed so the panel is never empty */
  if (!activePlantId) {
    const fallKey = activeBed + 'Fall';
    const bed = (gardenSeason === 'fall' && BEDS[fallKey]) ? BEDS[fallKey] : BEDS[activeBed];
    const firstPl = (bed && bed.plants && bed.plants[0]) || null;
    if (firstPl) activePlantId = firstPl.id;
  }
  setTimeout(renderDetails, 0);
  return panel;

function renderPlants(root) {
  /* Toolbar */
  const bar = el('div', { class: 'plants-toolbar' });
  const chips = el('div', { class: 'chips' });
  const families = ['all', ...new Set(Object.values(PLANT_INFO).map(p => p.fam))];
  families.forEach(f => {
    const c = el('button', {
      class: 'chip' + (activeFamilyFilter === f ? ' is-active' : ''),
      onclick: () => { activeFamilyFilter = f; renderAll(); },
    });
    if (f === 'all') c.textContent = 'All';
    else {
      c.appendChild(el('span', { class: 'chip-dot', style: `background:${FAM[f].color}` }));
      c.appendChild(document.createTextNode(FAM[f].label));
    }
    chips.appendChild(c);
  });
  bar.appendChild(chips);
  const search = el('input', {
    class: 'plants-search', type: 'search',
    placeholder: 'Search plants…',
    value: plantSearchQ,
  });
  search.addEventListener('input', e => {
    plantSearchQ = e.target.value.toLowerCase();
    rerenderGrid();
  });
  bar.appendChild(search);
  root.appendChild(bar);

  /* Grid */
  const grid = el('div', { class: 'plants-grid', id: 'plantsGrid' });
  root.appendChild(grid);

function rerenderGrid() {
  const grid = $('#plantsGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const entries = Object.entries(PLANT_INFO)
    .filter(([n, info]) => activeFamilyFilter === 'all' || info.fam === activeFamilyFilter)
    .filter(([n]) => !plantSearchQ || n.toLowerCase().includes(plantSearchQ))
    .sort((a, b) => {
      /* sort by family then name */
      if (a[1].fam !== b[1].fam) return a[1].fam.localeCompare(b[1].fam);
      return a[0].localeCompare(b[0]);
    });

  entries.forEach(([name, info]) => grid.appendChild(plantCard(name, info)));

  if (entries.length === 0) {
    grid.appendChild(el('p', { style: 'color:var(--ink-soft); font-style:italic; padding: 20px;' }, 'No plants match that filter.'));
  }

  const countEl = $('#plantCount');
  if (countEl) {
    const total = Object.keys(PLANT_INFO).length;
    countEl.textContent = entries.length < total
      ? `${entries.length} / ${total}`
      : `${total} kinds`;
  }
}

function plantCard(name, info) {
  const fam = FAM[info.fam];
  const qty = plantQty(name);
  const beds = plantBeds(name);
  const card = el('div', {
    class: 'plant-card' + (name === 'Nasturtium' ? ' nast-card' : ''),
    style: `--card-color: ${fam.color}`,
  });

  const head = el('div', { class: 'pc-head' });
  const disc = el('div', { class: 'pc-disc' }, info.code);
  head.appendChild(disc);
  const title = el('div', { style: 'flex:1; min-width:0;' });
  title.appendChild(el('h4', { class: 'pc-name' }, name));
  title.appendChild(el('div', { class: 'pc-var' }, info.variety));
  title.appendChild(el('div', { class: 'pc-fam' }, fam.label));
  head.appendChild(title);
  if (qty > 0) {
    const q = el('div', { class: 'pc-qty' });
    q.innerHTML = `${qty}<small>plant${qty===1?'':'s'}</small>`;
    head.appendChild(q);
  }
  card.appendChild(head);

  /* rows */
  const rowDef = [
    ['Sun', info.sun], ['Water', info.water], ['Soil', info.soil],
    ['Days', info.days], ['Spacing', info.spacing],
    ['Location', Object.entries(beds).map(([b,n])=>`${bedTitle(b)} (${n})`).join(', ') || '—'],
  ];
  rowDef.forEach(([k,v]) => {
    if (!v) return;
    const r = el('div', { class: 'pc-row' });
    if (k === 'Water') {
      const lvl = waterLevel(v);
      const dots = ['●','●','●'].map((d,i) => `<span style="opacity:${i < lvl ? '1' : '0.18'}">${d}</span>`).join('');
      const lbl = ['Low','Medium','High'][lvl - 1];
      r.innerHTML = `<div class="k">Water</div><div class="v">${v} <span class="water-dots" title="${lbl} water need">${dots}</span></div>`;
    } else {
      r.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
    }
    card.appendChild(r);
  });

  if (info.care) {
    const notes = el('div', { class: 'pc-notes' }, info.care);
    card.appendChild(notes);
  }
  if (info.companions && info.companions.length) {
    const sec = el('div', { class: 'pc-companions' });
    sec.appendChild(el('div', { class: 'pc-comp-label' }, 'Companion plants'));
    const list = el('div', { class: 'pc-comp-list' });
    info.companions.forEach(c => {
      const item = el('div', { class: 'pc-comp-item' });
      item.innerHTML = `<strong>${c.with}</strong> — ${c.benefit}`;
      list.appendChild(item);
    });
    sec.appendChild(list);
    card.appendChild(sec);
  }
  return card;
}

const FROST = { last: 5.33, first: 10.17 }; /* May 10 · Oct 5 */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderCalendar(root) {
  /* header */

  right.appendChild(makeFrostNote('First frost', '≈ Oct 5'));
  right.appendChild(makeFrostNote('Growing season', '≈ 148 days'));
  head.appendChild(right);
  root.appendChild(head);

  /* legend */
  const legend = el('div', { class: 'cal-legend' });
  legend.innerHTML = `
    <div class="item"><span class="sw" style="background: var(--cal-indoor)"></span>Start indoors</div>
    <div class="item"><span class="sw" style="background: var(--cal-harden)"></span>Harden off</div>
